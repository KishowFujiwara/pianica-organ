<line x1="95" y1="122" x2="95" y2="264" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="165" y1="122" x2="165" y2="264" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="240" y1="122" x2="240" y2="264" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="315" y1="122" x2="315" y2="264" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="390" y1="122" x2="390" y2="264" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="465" y1="122" x2="465" y2="264" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<text class="ts" x="280" y="200" text-anchor="middle" fill="#534AB7">B2c: 31 partition walls (88% of BN2)</text>
<!-- Mouthpiece -->
<rect x="440" y="180" width="100" height="14" rx="4" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="490" y="176" text-anchor="middle">Mouthpiece</text>
<line x1="540" y1="187" x2="450" y2="187" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="555" y="190" fill="#0F6E56">Breath</text>
<!-- Airflow up through reed -->
<line x1="212" y1="230" x2="212" y2="130" stroke="#5DCAA5" stroke-width="1" opacity="0.5" marker-end="url(#arrow)" stroke-dasharray="3 2"/>
<text class="ts" x="228" y="176" fill="#0F6E56" style="font-size:10px">Air up</text>
<!-- ABS bottom wall -->
<rect x="75" y="262" width="410" height="6" rx="1" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="280" y="258" text-anchor="middle">ABS chamber bottom</text>
<!-- Sponge -->
<rect x="75" y="274" width="410" height="6" rx="1" fill="#333" stroke="#555" stroke-width="0.3" stroke-dasharray="2 2"/>
<text class="ts" x="280" y="292" text-anchor="middle">Sponge (eta=0.3-0.5)</text>
<!-- Layer 3 -->
<rect x="60" y="300" width="480" height="36" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="300" y="322" text-anchor="middle" fill="#0C447C">Layer 3: blue ABS bottom case (slits)</text>
<!-- Slits -->
<rect x="120" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="160" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="200" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="240" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="280" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="320" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="360" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="400" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<rect x="440" y="306" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
<text class="ts" x="300" y="354" text-anchor="middle">Sound: 0.22 mW (0.085%)</text>
<!-- BN annotations -->
<rect x="556" y="112" width="120" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="616" y="128" text-anchor="middle" fill="#712B13">BN1: 82%</text>
<text class="ts" x="616" y="142" text-anchor="middle" fill="#993C1D">DC->AC</text>
<line x1="476" y1="126" x2="554" y2="128" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="3 2"/>
<circle cx="476" cy="126" r="2" fill="#993C1D"/>
<rect x="556" y="168" width="120" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="616" y="186" text-anchor="middle" fill="#3C3489">BN2: 47%</text>
<text class="ts" x="616" y="202" text-anchor="middle" fill="#534AB7">Plate->ABS</text>
<text class="ts" x="616" y="214" text-anchor="middle" fill="#534AB7">31 walls=88%</text>
<line x1="470" y1="210" x2="554" y2="196" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 2"/>
<circle cx="470" cy="210" r="2" fill="#534AB7"/>
<rect x="556" y="236" width="120" height="52" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="616" y="254" text-anchor="middle" fill="#633806">BN3: 99%</text>
<text class="ts" x="616" y="270" text-anchor="middle" fill="#854F0B">Double wall</text>
<text class="ts" x="616" y="282" text-anchor="middle" fill="#854F0B">Gamma=93</text>
<line x1="490" y1="274" x2="554" y2="268" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 2"/>
<circle cx="490" cy="274" r="2" fill="#854F0B"/>
<!-- Power flow -->
<line x1="40" y1="380" x2="640" y2="380" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="340" y="404" text-anchor="middle">Power flow: 265mW -> 48mW -> 25.5mW -> 13.5mW -> 0.22mW (0.085%)</text>
<!-- v3 -->
<rect x="40" y="430" width="600" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="340" y="452" text-anchor="middle" fill="#27500A">v3: Bond kiri to ABS chamber (T=96.5%) | Gamma 93->1.8 | +13dB</text>
<text class="ts" x="340" y="468" text-anchor="middle" fill="#3B6D11">Remove sponge + blue ABS, attach kiri directly to white ABS chamber walls</text>
</svg>
