<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>text{font-family:Arial,sans-serif}.th{font-size:14px;font-weight:500;fill:#2C2C2A}.ts{font-size:12px;fill:#5F5E5A}</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="340" y="24" text-anchor="middle" style="font-size:15px">Melodica cross-section v2.2</text>
<!-- Layer 1: Cover (protective only) -->
<rect x="80" y="46" width="440" height="20" rx="3" fill="#F1EFE8" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="300" y="60" text-anchor="middle">Layer 1: white ABS cover (protective lid, latch)</text>
<text class="ts" x="536" y="60">Not sealed</text>
<!-- Keys (between cover and plate) -->
<rect x="110" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="155" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="200" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="245" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="290" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="335" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="380" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="425" y="70" width="24" height="20" rx="1" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="138" y="70" width="15" height="14" rx="0.5" fill="#444" opacity="0.6"/>
<rect x="228" y="70" width="15" height="14" rx="0.5" fill="#444" opacity="0.6"/>
<rect x="318" y="70" width="15" height="14" rx="0.5" fill="#444" opacity="0.6"/>
<rect x="408" y="70" width="15" height="14" rx="0.5" fill="#444" opacity="0.6"/>
<text class="ts" x="280" y="68" text-anchor="middle" style="font-size:10px">Keys + valve mechanism</text>
<!-- Valve pads (one open) -->
<circle cx="212" cy="96" r="3" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="212" y="108" text-anchor="middle" style="fill:#0F6E56;font-size:10px">valve open</text>
<!-- Reed plate -->
<rect x="85" y="112" width="390" height="10" rx="1" fill="#D4A520" stroke="#996515" stroke-width="0.5"/>
<text class="ts" x="42" y="120" text-anchor="end" fill="#996515">Reed plate</text>
<!-- Gasket (between plate and ABS frame - CORRECT position) -->
<rect x="85" y="122" width="390" height="4" rx="0.5" fill="#333" stroke="#111" stroke-width="0.3"/>
<text class="ts" x="536" y="120">Gasket (plate-ABS)</text>
<text class="ts" x="536" y="133" fill="#993C1D">Airtight seal</text>
<!-- Reeds hanging below plate -->
<rect x="128" y="114" width="14" height="4" rx="0.5" fill="#D4A520" stroke="#996515" stroke-width="0.3" transform="rotate(180 135 116)"/>
<rect x="205" y="122" width="14" height="4" rx="0.5" fill="#EF9F27" stroke="#854F0B" stroke-width="0.6"/>
<rect x="280" y="122" width="12" height="3" rx="0.5" fill="#D4A520" stroke="#996515" stroke-width="0.3"/>
<rect x="355" y="122" width="10" height="3" rx="0.5" fill="#D4A520" stroke="#996515" stroke-width="0.3"/>
<rect x="430" y="122" width="8" height="3" rx="0.5" fill="#D4A520" stroke="#996515" stroke-width="0.3"/>
<!-- Active reed vibration -->
<path d="M203 130 Q207 134 211 130 Q215 126 219 130" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.7"/>
<path d="M201 136 Q207 141 213 136 Q219 131 225 136" fill="none" stroke="#EF9F27" stroke-width="0.5" opacity="0.4"/>
<!-- Layer 2: ABS Air Chamber -->
<rect x="60" y="126" width="480" height="155" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
