<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="sans-serif">
  <style>
    .title { font-size: 22px; font-weight: bold; }
    .h1 { font-size: 16px; font-weight: bold; }
    .label { font-size: 13px; }
    .small { font-size: 11px; fill: #555; }
    .num { font-size: 13px; font-weight: bold; }
    .panel-air { fill: #eef5fb; stroke: #2a6ca0; stroke-width: 2; }
    .panel-res { fill: #fdf5e8; stroke: #c47a00; stroke-width: 2; }
    .panel-jud { fill: #f4f0fa; stroke: #5a3a8a; stroke-width: 2; }
    .ok-zone { fill: #c8e6c9; opacity: 0.7; }
    .max-line { stroke: #b00020; stroke-width: 2; stroke-dasharray: 5 3; }
    .min-line { stroke: #2a7a2a; stroke-width: 2; stroke-dasharray: 5 3; }
    .axis { stroke: #333; stroke-width: 1.5; fill: none; }
    .grid { stroke: #ddd; stroke-width: 0.5; }
  </style>

  <text x="490" y="32" text-anchor="middle" class="title">桐箱 空気室 + 共鳴箱 の理想体積</text>
  <text x="490" y="54" text-anchor="middle" class="small">物理的拘束からの導出 — F3=175Hz, 37音, 吹奏圧1200Pa</text>

  <!-- ============= LEFT: 空気室 ============= -->
  <rect x="30" y="80" width="450" height="320" rx="10" class="panel-air"/>
  <text x="255" y="105" text-anchor="middle" class="h1">[空気室 V_air]</text>
  <text x="255" y="125" text-anchor="middle" class="small">圧力供給源としての拘束</text>

  <!-- 体積軸 0.5 to 10 L -->
  <line x1="80" y1="320" x2="430" y2="320" class="axis"/>
  <line x1="80" y1="160" x2="80" y2="320" class="axis"/>
  <text x="255" y="345" text-anchor="middle" class="small">V_air [L]</text>
  <text x="65" y="240" text-anchor="middle" class="small" transform="rotate(-90 65 240)">拘束タイプ</text>

  <!-- 目盛 -->
  <text x="80" y="335" text-anchor="middle" class="small">0.5</text>
  <text x="143" y="335" text-anchor="middle" class="small">1.0</text>
  <text x="206" y="335" text-anchor="middle" class="small">2.0</text>
  <text x="270" y="335" text-anchor="middle" class="small">3.5</text>
  <text x="370" y="335" text-anchor="middle" class="small">10</text>
  <line x1="80" y1="320" x2="80" y2="324" class="axis"/>
  <line x1="143" y1="320" x2="143" y2="324" class="axis"/>
  <line x1="206" y1="320" x2="206" y2="324" class="axis"/>
  <line x1="270" y1="320" x2="270" y2="324" class="axis"/>
  <line x1="370" y1="320" x2="370" y2="324" class="axis"/>

  <!-- 推奨ゾーン: 1.5L〜3.5L -->
  <rect x="170" y="160" width="115" height="160" class="ok-zone"/>
  <text x="227" y="180" text-anchor="middle" class="num" fill="#2a7a2a">推奨レンジ</text>
  <text x="227" y="195" text-anchor="middle" class="small">1.5 - 3.5 L</text>

  <!-- 拘束バー -->
  <g transform="translate(80,220)">
    <text x="0" y="-5" class="small">A1 単音過渡</text>
    <rect x="60" y="0" width="20" height="10" fill="#2a7a2a"/>
    <text x="85" y="9" class="small">≥0.5L</text>
  </g>
  <g transform="translate(80,240)">
    <text x="0" y="-5" class="small">A3 脈動5Hz吸収 (R依存)</text>
    <rect x="60" y="0" width="220" height="10" fill="#0050a0" opacity="0.5"/>
    <text x="285" y="9" class="small">R次第で1〜9L</text>
  </g>
  <g transform="translate(80,260)">
    <text x="0" y="-5" class="small">A4 応答 ≤5ms (上限)</text>
    <line x1="0" y1="5" x2="240" y2="5" stroke="#b00020" stroke-width="2"/>
    <line x1="240" y1="0" x2="240" y2="10" stroke="#b00020" stroke-width="2"/>
    <text x="245" y="9" class="small">≤3.5L</text>
  </g>
  <g transform="translate(80,290)">
    <text x="0" y="-5" class="small">現行スピネット 1.85L</text>
    <circle cx="190" cy="5" r="6" fill="#c47a00"/>
    <text x="200" y="9" class="num" fill="#c47a00">[PASS]</text>
  </g>
  <text x="255" y="382" text-anchor="middle" class="num" fill="#2a6ca0">推奨: V_air = 2.0 L</text>

  <!-- ============= RIGHT: 共鳴箱 ============= -->
  <rect x="500" y="80" width="450" height="320" rx="10" class="panel-res"/>
  <text x="725" y="105" text-anchor="middle" class="h1">[共鳴箱 V_res]</text>
  <text x="725" y="125" text-anchor="middle" class="small">音響放射場としての拘束</text>

  <!-- ヘルムホルツ式 -->
  <text x="725" y="155" text-anchor="middle" class="label">f_H = (c/2π)·√(A / (l_eff·V))</text>
  <text x="725" y="175" text-anchor="middle" class="small">V = A / (l_eff · (2πf/c)²),  f = F3 = 175 Hz</text>

  <!-- ポート径 vs 必要V のグラフ -->
  <g transform="translate(540,200)">
    <line x1="0" y1="100" x2="370" y2="100" class="axis"/>
    <line x1="0" y1="0" x2="0" y2="100" class="axis"/>
    <text x="-30" y="50" class="small" transform="rotate(-90 -30 50)">V [L]</text>
    <text x="185" y="125" text-anchor="middle" class="small">ポート径 [mm]</text>

    <!-- 目盛 -->
    <text x="0" y="115" text-anchor="middle" class="small">15</text>
    <text x="74" y="115" text-anchor="middle" class="small">20</text>
    <text x="148" y="115" text-anchor="middle" class="small">25</text>
    <text x="222" y="115" text-anchor="middle" class="small">30</text>
    <text x="370" y="115" text-anchor="middle" class="small">40</text>
    <text x="-15" y="100" text-anchor="end" class="small">0</text>
    <text x="-15" y="68" text-anchor="end" class="small">1</text>
    <text x="-15" y="36" text-anchor="end" class="small">2</text>
    <text x="-15" y="4" text-anchor="end" class="small">3</text>

    <!-- データ点 (15:0.97, 20:1.39, 25:1.82, 30:2.26, 40:3.14) -->
    <polyline points="0,69 74,55 148,42 222,28 370,0" 
              stroke="#c47a00" stroke-width="2" fill="none"/>
    <circle cx="0" cy="69" r="4" fill="#c47a00"/>
    <circle cx="74" cy="55" r="4" fill="#c47a00"/>
    <circle cx="148" cy="42" r="4" fill="#c47a00"/>
    <circle cx="222" cy="28" r="4" fill="#c47a00"/>
    <circle cx="370" cy="0" r="4" fill="#c47a00"/>

    <!-- 値ラベル -->
    <text x="0" y="65" text-anchor="middle" class="small">0.97</text>
    <text x="74" y="48" text-anchor="middle" class="num" fill="#c47a00">1.39</text>
    <text x="148" y="35" text-anchor="middle" class="small">1.82</text>
    <text x="222" y="21" text-anchor="middle" class="small">2.26</text>
    <text x="370" y="-7" text-anchor="middle" class="small">3.14</text>

    <!-- 現行設計 マーカー -->
    <rect x="60" y="48" width="28" height="18" fill="none" stroke="#b00020" stroke-width="2"/>
    <text x="74" y="-5" text-anchor="middle" class="small" fill="#b00020">現行 20mm</text>
  </g>

  <text x="725" y="365" text-anchor="middle" class="num" fill="#c47a00">物理確定: V_Bass = 1.39 L (20mm)</text>
  <text x="725" y="385" text-anchor="middle" class="small">ポート径と Vはトレードオフ。設計選択次第で 1〜3 L</text>

  <!-- ============= BOTTOM: 3案比較 ============= -->
  <rect x="30" y="420" width="920" height="270" rx="10" class="panel-jud"/>
  <text x="490" y="445" text-anchor="middle" class="h1">共鳴箱 3案比較 — 全体構成</text>

  <!-- 案α: 単一箱 -->
  <g transform="translate(60,470)">
    <text x="120" y="0" text-anchor="middle" class="h1">案 α (Bass単独)</text>
    <text x="120" y="20" text-anchor="middle" class="small">最も単純</text>
    <rect x="20" y="35" width="200" height="100" fill="#f4f0fa" stroke="#5a3a8a" stroke-width="2"/>
    <rect x="105" y="80" width="30" height="10" fill="#fff" stroke="#5a3a8a"/>
    <text x="120" y="78" text-anchor="middle" class="small">port 20mm</text>
    <text x="120" y="115" text-anchor="middle" class="num">V = 1.4 L</text>
    <line x1="20" y1="155" x2="220" y2="155" stroke="#666" stroke-width="0.5"/>
    <text x="0" y="175" class="small">F3整合:</text>
    <text x="240" y="175" text-anchor="end" class="small">[PASS]</text>
    <text x="0" y="192" class="small">中音強化:</text>
    <text x="240" y="192" text-anchor="end" class="small">板モード任せ</text>
    <text x="0" y="209" class="small">複雑度:</text>
    <text x="240" y="209" text-anchor="end" class="num" fill="#2a7a2a">★</text>
  </g>

  <!-- 案β: 2分割 -->
  <g transform="translate(360,470)">
    <text x="120" y="0" text-anchor="middle" class="h1">案 β (2分割)</text>
    <text x="120" y="20" text-anchor="middle" class="small">中音強化型・推奨</text>
    <rect x="20" y="35" width="100" height="100" fill="#f4f0fa" stroke="#5a3a8a" stroke-width="2"/>
    <rect x="120" y="35" width="100" height="100" fill="#f4f0fa" stroke="#5a3a8a" stroke-width="2"/>
    <text x="70" y="90" text-anchor="middle" class="small">Bass</text>
    <text x="70" y="105" text-anchor="middle" class="small">1.4L</text>
    <text x="170" y="90" text-anchor="middle" class="small">Mid+Tre</text>
    <text x="170" y="105" text-anchor="middle" class="small">1.5L</text>
    <rect x="55" y="80" width="20" height="8" fill="#fff" stroke="#5a3a8a"/>
    <rect x="155" y="80" width="20" height="8" fill="#fff" stroke="#5a3a8a"/>
    <text x="120" y="155" text-anchor="middle" class="num">合計 V = 2.9 L</text>
    <line x1="20" y1="170" x2="220" y2="170" stroke="#666" stroke-width="0.5"/>
    <text x="0" y="190" class="small">F3整合:</text>
    <text x="240" y="190" text-anchor="end" class="small">[PASS]</text>
    <text x="0" y="207" class="small">中音強化:</text>
    <text x="240" y="207" text-anchor="end" class="small">副ポートで350Hz</text>
    <text x="0" y="223" class="small">複雑度:</text>
    <text x="240" y="223" text-anchor="end" class="num" fill="#c47a00">★★</text>
  </g>

  <!-- 案γ: スピネット3分割(現行) -->
  <g transform="translate(680,470)">
    <text x="120" y="0" text-anchor="middle" class="h1">案 γ (スピネット3分割)</text>
    <text x="120" y="20" text-anchor="middle" class="small">現行 dfc79ff</text>
    <polygon points="20,135 220,135 200,35 40,35" fill="#f4f0fa" stroke="#5a3a8a" stroke-width="2"/>
    <line x1="56" y1="35" x2="80" y2="135" stroke="#5a3a8a" stroke-width="1.5"/>
    <line x1="160" y1="35" x2="160" y2="135" stroke="#5a3a8a" stroke-width="1.5"/>
    <text x="55" y="95" text-anchor="middle" class="small">B</text>
    <text x="55" y="110" text-anchor="middle" class="small">1.37</text>
    <text x="120" y="95" text-anchor="middle" class="small">M</text>
    <text x="120" y="110" text-anchor="middle" class="small">1.23</text>
    <text x="180" y="95" text-anchor="middle" class="small">T</text>
    <text x="180" y="110" text-anchor="middle" class="small">1.09</text>
    <text x="120" y="155" text-anchor="middle" class="num">合計 V = 3.7 L</text>
    <line x1="20" y1="170" x2="220" y2="170" stroke="#666" stroke-width="0.5"/>
    <text x="0" y="190" class="small">F3整合:</text>
    <text x="240" y="190" text-anchor="end" class="small">[PASS]</text>
    <text x="0" y="207" class="small">中音強化:</text>
    <text x="240" y="207" text-anchor="end" class="small">3副ポート要設計</text>
    <text x="0" y="223" class="small">複雑度:</text>
    <text x="240" y="223" text-anchor="end" class="num" fill="#b00020">★★★</text>
  </g>

  <!-- 結論 -->
  <text x="490" y="705" text-anchor="middle" class="h1">推奨: V_air = 2.0 L + V_res = 案β 2.9 L (中音域副ポート付き)</text>
</svg>
