<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>全体組立断面図 -- 共鳴箱 + 鍵盤ユニット + 吹き口</title>
<desc>共鳴箱、リードプレート、鍵盤ユニット、吹き口の関係</desc>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="340" y="30" text-anchor="middle">教会用リードオルガン v3 -- 全体組立 (ピアニカ原理駆動)</text>
<text class="ts" x="340" y="50" text-anchor="middle">共鳴箱 + 鍵盤ユニット (リードプレート + 空気室) + 吹き口</text>

<text class="th" x="40" y="90">[A] 全体側面図 (鍵盤を低音側に配置)</text>

<rect x="160" y="120" width="400" height="80" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<rect x="164" y="123" width="392" height="2" fill="#993C1D"/>
<text class="ts" x="360" y="138" text-anchor="middle" fill="#993C1D">トップ板 1.5mm + X-brace</text>
<text class="ts" x="360" y="160" text-anchor="middle" fill="#854F0B">共鳴箱 (内寸 542 x 76)</text>
<text class="ts" x="360" y="180" text-anchor="middle" fill="#854F0B">V = 14.2 L</text>

<circle cx="380" cy="125" r="6" fill="none" stroke="#993C1D" stroke-width="2"/>
<text class="ts" x="380" y="115" text-anchor="middle" fill="#993C1D">SH</text>

<rect x="290" y="180" width="80" height="20" fill="#D4A54A" stroke="#5C3D12" stroke-width="0.5"/>
<text class="ts" x="330" y="194" text-anchor="middle" fill="#4A1B0C">Reed plate</text>
<line x1="330" y1="180" x2="330" y2="125" stroke="#5C3D12" stroke-width="0.5" stroke-dasharray="2 2"/>

<rect x="50" y="220" width="120" height="80" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="110" y="245" text-anchor="middle" fill="#0C447C">鍵盤ユニット</text>
<text class="ts" x="110" y="265" text-anchor="middle" fill="#185FA5">300x80x60mm</text>
<text class="ts" x="110" y="282" text-anchor="middle" fill="#185FA5">37鍵 + バルブ</text>

<rect x="70" y="290" width="80" height="10" fill="#D4A54A" stroke="#5C3D12" stroke-width="0.5"/>
<text class="ts" x="110" y="315" text-anchor="middle" fill="#5C3D12">Reed plate (CAHAYA流用)</text>

<path d="M170 260 Q220 280 260 280 Q280 280 290 200" stroke="#185FA5" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
<text class="ts" x="220" y="300" text-anchor="middle" fill="#185FA5">空気経路</text>

<rect x="20" y="240" width="30" height="20" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="35" y="270" text-anchor="middle" fill="#085041">吹き口</text>
<line x1="50" y1="250" x2="60" y2="250" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>

<text class="ts" x="240" y="350" fill="#444441">[空気の流れ]</text>
<text class="ts" x="240" y="368" fill="#444441">吹き口 -> 鍵盤ユニット内空気室 -> 鍵バルブ -> リードプレート -> リード振動</text>
<text class="ts" x="240" y="386" fill="#444441">                                                      |</text>
<text class="ts" x="240" y="404" fill="#444441">                                                      v</text>
<text class="ts" x="240" y="422" fill="#444441">共鳴箱内部空気 (14.2L) -> トップ板駆動 -> 結合振動 -> サウンドホール + 板放射</text>

<text class="th" x="40" y="470">[B] 鍵盤ユニットの上面詳細</text>

<rect x="60" y="490" width="560" height="150" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>

<rect x="80" y="515" width="380" height="40" rx="2" fill="none" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="270" y="540" text-anchor="middle" fill="#0C447C">37鍵 (F3-F6) ピッチ 約8mm</text>

<rect x="170" y="570" width="200" height="20" fill="#D4A54A" stroke="#5C3D12" stroke-width="0.5"/>
<text class="ts" x="270" y="584" text-anchor="middle" fill="#4A1B0C">Reed plate 200x40 (CAHAYAから流用)</text>

<rect x="480" y="510" width="80" height="50" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="520" y="535" text-anchor="middle" fill="#085041">小型空気室</text>
<text class="ts" x="520" y="552" text-anchor="middle" fill="#085041">脈動平滑</text>

<rect x="475" y="600" width="30" height="20" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="490" y="613" text-anchor="middle" fill="#04342C">吹き口</text>
<line x1="490" y1="600" x2="490" y2="565" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>

<line x1="170" y1="565" x2="370" y2="565" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="270" y="615" text-anchor="middle" fill="#185FA5">バルブ機構: ピアニカ標準 (鍵が上、リード上面側)</text>

<text class="th" x="40" y="680">[C] ピアニカ原理の継承点</text>
<text class="ts" x="40" y="702" fill="#444441">- フットポンプ・大型リザーバーは無し (ピアニカ的呼気駆動 200-500Pa)</text>
<text class="ts" x="40" y="720" fill="#444441">- 鍵盤ユニットは P-32D / CAHAYA とほぼ同じ動作 (リード+小空気室+鍵バルブ)</text>
<text class="ts" x="40" y="738" fill="#444441">- 違いはダウンストリーム: 鍵盤ユニット出口を「外気」ではなく「共鳴箱14.2L」に繋ぐ</text>

</svg>
