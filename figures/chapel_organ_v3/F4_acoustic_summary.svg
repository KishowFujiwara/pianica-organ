<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img">
<title>音響特性まとめ -- 共鳴・音域・モードの周波数軸対応</title>
<desc>T0/T1、A0、空気モード、音域F3-F6を周波数軸で並べた俯瞰図</desc>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
</style>

<text class="th" x="340" y="30" text-anchor="middle">音響特性 周波数軸まとめ (案C: V=14.2L, 桐1.5mm + X-brace)</text>

<line x1="60" y1="450" x2="640" y2="450" stroke="#5F5E5A" stroke-width="0.5"/>

<line x1="60" y1="445" x2="60" y2="455" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="170" y1="445" x2="170" y2="455" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="280" y1="445" x2="280" y2="455" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="390" y1="445" x2="390" y2="455" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="500" y1="445" x2="500" y2="455" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="610" y1="445" x2="610" y2="455" stroke="#5F5E5A" stroke-width="0.5"/>

<text class="ts" x="60" y="470" text-anchor="middle">20</text>
<text class="ts" x="170" y="470" text-anchor="middle">63</text>
<text class="ts" x="280" y="470" text-anchor="middle">200</text>
<text class="ts" x="390" y="470" text-anchor="middle">630</text>
<text class="ts" x="500" y="470" text-anchor="middle">2k</text>
<text class="ts" x="610" y="470" text-anchor="middle">6.3k</text>
<text class="ts" x="340" y="490" text-anchor="middle">Frequency [Hz] (log scale)</text>

<text class="th" x="40" y="80">音域 (F3-F6) 37音</text>
<rect x="234" y="90" width="216" height="20" fill="#7F77DD" opacity="0.35" rx="3"/>
<text class="ts" x="234" y="105" text-anchor="middle" fill="#3C3489">F3</text>
<text class="ts" x="450" y="105" text-anchor="middle" fill="#3C3489">F6</text>
<text class="ts" x="342" y="105" text-anchor="middle" fill="#26215C">175 - 1397 Hz</text>

<text class="th" x="40" y="140">共鳴 (T0/T1 結合系)</text>
<rect x="155" y="150" width="6" height="20" fill="#D4537E"/>
<text class="ts" x="161" y="148" text-anchor="middle" fill="#993556">T0=38</text>
<text class="ts" x="161" y="138" text-anchor="middle" fill="#993556">Hz</text>

<rect x="312" y="150" width="6" height="20" fill="#D4537E"/>
<text class="ts" x="318" y="148" text-anchor="middle" fill="#993556">T1=345</text>
<text class="ts" x="318" y="138" text-anchor="middle" fill="#993556">Hz</text>

<text class="th" x="40" y="210">バスレフ A0</text>
<rect x="207" y="220" width="6" height="20" fill="#D85A30"/>
<text class="ts" x="213" y="218" text-anchor="middle" fill="#993C1D">A0=80</text>
<text class="ts" x="213" y="208" text-anchor="middle" fill="#993C1D">Hz</text>

<text class="th" x="40" y="280">空気モード (定在波)</text>
<rect x="305" y="290" width="6" height="20" fill="#0F6E56"/>
<text class="ts" x="311" y="288" text-anchor="middle" fill="#085041">316</text>

<rect x="354" y="290" width="6" height="20" fill="#0F6E56"/>
<text class="ts" x="360" y="288" text-anchor="middle" fill="#085041">501</text>

<rect x="382" y="290" width="6" height="20" fill="#0F6E56" opacity="0.7"/>
<rect x="396" y="290" width="6" height="20" fill="#0F6E56" opacity="0.7"/>
<text class="ts" x="395" y="276" text-anchor="middle" fill="#085041">593,633</text>

<rect x="441" y="290" width="6" height="20" fill="#0F6E56" opacity="0.5"/>
<rect x="478" y="290" width="6" height="20" fill="#0F6E56" opacity="0.5"/>
<rect x="495" y="290" width="6" height="20" fill="#0F6E56" opacity="0.5"/>
<text class="ts" x="475" y="335" text-anchor="middle" fill="#085041">高次 (内部曲面壁で分散)</text>

<text class="th" x="40" y="370">トップ板モード (X-brace込)</text>
<rect x="295" y="380" width="6" height="20" fill="#185FA5"/>
<text class="ts" x="301" y="378" text-anchor="middle" fill="#0C447C">f_p=164</text>

<text class="th" x="60" y="540">特記:</text>
<text class="ts" x="60" y="525" fill="#444441" font-style="italic">T1=345Hz は F4 (349Hz) 近傍 -> 中音域に主共鳴ピーク (好ましい)</text>

</svg>
