<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 760" width="680" height="760" font-family="sans-serif">
  <title>ピアニカ小型パイプオルガンの最終形態</title>
  <desc>足踏みオルガン型エンクロージャーに収まる37ラッパ改造楽器</desc>

  <text x="40" y="34" font-size="14" font-weight="500" fill="#2C2C2A">最終形態: 足踏みオルガン型エンクロージャー</text>
  <line x1="40" y1="54" x2="640" y2="54" stroke="#888780" stroke-width="0.5"/>

  <rect x="180" y="90" width="320" height="540" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2" rx="4"/>

  <rect x="200" y="110" width="280" height="24" fill="#D4A76A" stroke="#854F0B" stroke-width="0.8" rx="2"/>
  <text x="340" y="126" font-size="12" text-anchor="middle" fill="#412402">松天板(前面上段、二次放射)</text>

  <g transform="translate(200, 150)">
    <line x1="8" y1="0" x2="8" y2="80" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="8" cy="80" r="5" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="22" y1="0" x2="22" y2="90" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="22" cy="90" r="5" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="36" y1="0" x2="36" y2="100" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="36" cy="100" r="5" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="50" y1="0" x2="50" y2="110" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="50" cy="110" r="6" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="66" y1="0" x2="66" y2="125" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="66" cy="125" r="6" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="82" y1="0" x2="82" y2="140" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="82" cy="140" r="7" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="100" y1="0" x2="100" y2="160" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="100" cy="160" r="7" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="118" y1="0" x2="118" y2="175" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="118" cy="175" r="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="138" y1="0" x2="138" y2="190" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="138" cy="190" r="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="160" y1="0" x2="160" y2="210" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="160" cy="210" r="9" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="184" y1="0" x2="184" y2="230" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="184" cy="230" r="10" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="210" y1="0" x2="210" y2="250" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="210" cy="250" r="11" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="240" y1="0" x2="240" y2="270" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="240" cy="270" r="12" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>

    <line x1="265" y1="0" x2="265" y2="290" stroke="#534AB7" stroke-width="0.8"/>
    <circle cx="265" cy="290" r="12" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  </g>

  <text x="80" y="175" font-size="12" text-anchor="end" fill="#5F5E5A">37本の</text>
  <text x="80" y="193" font-size="12" text-anchor="end" fill="#5F5E5A">ラッパ</text>
  <text x="80" y="211" font-size="12" text-anchor="end" fill="#5F5E5A">(垂直配置)</text>
  <text x="80" y="229" font-size="12" text-anchor="end" fill="#5F5E5A">小 -> 大</text>

  <rect x="200" y="460" width="280" height="40" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8" rx="4"/>
  <text x="340" y="485" font-size="12" text-anchor="middle" fill="#0C447C">ピアニカ本体(リード + 空気室)</text>

  <rect x="200" y="505" width="280" height="18" fill="#2C2C2A" stroke="#888780" stroke-width="0.3"/>
  <rect x="208" y="505" width="12" height="12" fill="#FFFFFF"/>
  <rect x="224" y="505" width="12" height="12" fill="#FFFFFF"/>
  <rect x="240" y="505" width="12" height="12" fill="#FFFFFF"/>
  <rect x="256" y="505" width="12" height="12" fill="#FFFFFF"/>
  <rect x="272" y="505" width="12" height="12" fill="#FFFFFF"/>
  <text x="340" y="518" font-size="12" text-anchor="middle" fill="#FFFFFF">鍵盤 37鍵</text>

  <rect x="200" y="540" width="280" height="70" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" rx="4"/>
  <text x="340" y="565" font-size="12" text-anchor="middle" fill="#3C3489">ブロワ or 足踏みペダル機構</text>
  <text x="340" y="583" font-size="12" text-anchor="middle" fill="#3C3489">加圧(Phase 2) or 吸引(Phase 3)</text>
  <text x="340" y="601" font-size="12" text-anchor="middle" fill="#3C3489">リザーバ付き</text>

  <text x="40" y="168" font-size="12" fill="#5F5E5A">高さ</text>
  <text x="40" y="184" font-size="12" fill="#5F5E5A">100 cm</text>

  <line x1="130" y1="90" x2="130" y2="630" stroke="#888780" stroke-width="0.3"/>
  <line x1="125" y1="90" x2="135" y2="90" stroke="#888780" stroke-width="0.3"/>
  <line x1="125" y1="630" x2="135" y2="630" stroke="#888780" stroke-width="0.3"/>

  <text x="520" y="170" font-size="12" fill="#5F5E5A">幅 120 cm</text>
  <text x="520" y="186" font-size="12" fill="#5F5E5A">奥行 50 cm</text>

  <line x1="40" y1="646" x2="640" y2="646" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="672" font-size="14" font-weight="500" fill="#D85A30">段階計画</text>

  <text x="40" y="694" font-size="12" fill="#5F5E5A">Phase 0(1ヶ月): 1ラッパ概念実証</text>
  <text x="40" y="712" font-size="12" fill="#5F5E5A">Phase 1(3ヶ月): 12鍵ミニ版、加圧駆動</text>
  <text x="340" y="694" font-size="12" fill="#5F5E5A">Phase 2(半年): 37鍵完全版、エンクロージャー</text>
  <text x="340" y="712" font-size="12" fill="#5F5E5A">Phase 3(1年): 吸引駆動化、足踏み完成</text>

  <text x="40" y="740" font-size="12" fill="#888780">材料費概算: 約 67,000円(本格パイプオルガンの1/100以下)</text>
</svg>
