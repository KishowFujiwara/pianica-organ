<svg width="680" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>text{font-family:Arial,sans-serif}.th{font-size:14px;font-weight:500;fill:#2C2C2A}.ts{font-size:12px;fill:#5F5E5A}</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="340" y="24" text-anchor="middle" style="font-size:15px">Melodica cross-section v2.1 (gasket position corrected)</text>
<!-- Layer 1 -->
<rect x="80" y="46" width="440" height="28" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="300" y="64" text-anchor="middle" fill="#0C447C">Layer 1: white ABS cover (~1mm)</text>
<text class="ts" x="530" y="52" fill="#185FA5">Sealed boundary</text>
<text class="ts" x="530" y="66" fill="#185FA5">Gamma=20.6 (4.6%)</text>
<!-- Latch -->
<path d="M78 50 L72 50 L72 80 L78 80" fill="none" stroke="#185FA5" stroke-width="1"/>
<text class="ts" x="56" y="68" text-anchor="end" fill="#185FA5">Latch</text>
<path d="M522 50 L528 50 L528 80 L522 80" fill="none" stroke="#185FA5" stroke-width="1"/>
<!-- Gasket -->
<rect x="85" y="74" width="430" height="5" rx="1" fill="#333" stroke="#111" stroke-width="0.5"/>
<text class="ts" x="546" y="80">Rubber gasket</text>
<text class="ts" x="546" y="93">eta=0.1-0.3</text>
<!-- Reed plate -->
<rect x="85" y="79" width="430" height="10" rx="1" fill="#D4A520" stroke="#996515" stroke-width="0.5"/>
<text class="ts" x="42" y="88" text-anchor="end" fill="#996515">Reed plate</text>
<!-- Valve open -->
<circle cx="235" cy="56" r="3.5" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="235" y="51" text-anchor="middle" fill="#0F6E56" style="font-size:10px">valve open</text>
<!-- Reeds -->
<rect x="228" y="89" width="14" height="4" rx="0.5" fill="#EF9F27" stroke="#854F0B" stroke-width="0.6"/>
<path d="M226 96 Q230 100 234 96 Q238 92 242 96" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.7"/>
<!-- Layer 2 -->
<rect x="60" y="95" width="480" height="175" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="300" y="115" text-anchor="middle">Layer 2: ABS air chamber (below plate)</text>
<!-- Partitions -->
<line x1="100" y1="89" x2="100" y2="250" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="165" y1="89" x2="165" y2="250" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="218" y1="89" x2="218" y2="250" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="270" y1="89" x2="270" y2="250" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="320" y1="89" x2="320" y2="250" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="370" y1="89" x2="370" y2="250" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<line x1="420" y1="89" x2="420" y2="250" stroke="#888" stroke-width="1.5" opacity="0.4"/>
<text class="ts" x="245" y="180" text-anchor="middle" fill="#534AB7">B2c: 31 partitions (88%)</text>
<!-- Mouthpiece -->
<rect x="440" y="160" width="100" height="14" rx="4" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="490" y="152" text-anchor="middle">Mouthpiece</text>
<line x1="540" y1="167" x2="450" y2="167" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="555" y="170" fill="#0F6E56">Breath</text>
<!-- ABS bottom -->
<rect x="75" y="248" width="410" height="6" rx="1" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="280" y="244" text-anchor="middle">ABS chamber bottom</text>
<!-- Sponge -->
<rect x="75" y="260" width="410" height="6" rx="1" fill="#333" stroke="#555" stroke-width="0.3" stroke-dasharray="2 2"/>
<text class="ts" x="280" y="278" text-anchor="middle">Sponge (eta=0.3-0.5)</text>
<!-- Layer 3 -->
<rect x="60" y="286" width="480" height="36" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="300" y="308" text-anchor="middle" fill="#0C447C">Layer 3: blue ABS bottom (slits)</text>
<text class="ts" x="300" y="340" text-anchor="middle">Sound: 0.22 mW (0.085%)</text>
<!-- BN annotations -->
<rect x="556" y="108" width="120" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="616" y="126" text-anchor="middle" fill="#712B13">BN1: 82%</text>
<text class="ts" x="616" y="142" text-anchor="middle" fill="#993C1D">DC->AC</text>
<rect x="556" y="168" width="120" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="616" y="188" text-anchor="middle" fill="#3C3489">BN2: 47%</text>
<text class="ts" x="616" y="204" text-anchor="middle" fill="#534AB7">Plate->ABS</text>
<text class="ts" x="616" y="216" text-anchor="middle" fill="#534AB7">31 walls=88%</text>
<rect x="556" y="240" width="120" height="56" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="616" y="258" text-anchor="middle" fill="#633806">BN3: 99%</text>
<text class="ts" x="616" y="274" text-anchor="middle" fill="#854F0B">Double wall</text>
<text class="ts" x="616" y="286" text-anchor="middle" fill="#854F0B">Gamma=93</text>
<!-- Correction box -->
<rect x="40" y="360" width="600" height="62" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="380" text-anchor="middle" fill="#712B13">Corrected: gasket between plate and cover</text>
<text class="ts" x="340" y="398" text-anchor="middle" fill="#993C1D">Cover -- [gasket] -- plate -- [partitions] -- ABS -- [sponge] -- blue ABS</text>
<text class="ts" x="340" y="412" text-anchor="middle" fill="#993C1D">Cover is sealed boundary (Gamma=20.6). C4: -40dB -> -25~-30dB</text>
<!-- v3 -->
<rect x="40" y="570" width="600" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="340" y="590" text-anchor="middle" fill="#27500A">v3: Bond kiri to ABS (T=96.5%) | Gamma 93->1.8 | +13dB | 85dB SPL</text>
<text class="ts" x="340" y="606" text-anchor="middle" fill="#3B6D11">Cover also replaceable with kiri -> additional gain on upper radiation path</text>
</svg>
