<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<style>
.th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #3d3d3a; }
.ts { font-family: sans-serif; font-size: 12px; fill: #5f5e5a; }
</style>
<text class="th" x="340" y="32" text-anchor="middle">Bridge as impedance transformer</text>
<rect x="40" y="130" width="600" height="70" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text class="th" x="340" y="155" text-anchor="middle">Energy transmission at each boundary</text>
<text class="ts" x="340" y="178" text-anchor="middle">T = 4*Z1*Z2 / (Z1 + Z2)^2    ... T -> 1 when Z1 = Z2</text>
<rect x="40" y="220" width="190" height="200" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text class="th" x="135" y="244" text-anchor="middle">Guitar bridge</text>
<text class="ts" x="135" y="392" text-anchor="middle">Ratio: 1:170</text>
<text class="ts" x="135" y="408" text-anchor="middle" fill="#E24B4A">T ~ 2.3%</text>
<rect x="245" y="220" width="190" height="200" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text class="th" x="340" y="244" text-anchor="middle">Piano bridge</text>
<text class="ts" x="340" y="392" text-anchor="middle">Ratio: 1:10 - 1:200</text>
<text class="ts" x="340" y="408" text-anchor="middle" fill="#1D9E75">T ~ 2-30%</text>
<rect x="450" y="220" width="190" height="200" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text class="th" x="545" y="244" text-anchor="middle">Violin bridge</text>
<text class="ts" x="545" y="392" text-anchor="middle">Ratio: 1:200</text>
<text class="ts" x="545" y="408" text-anchor="middle" fill="#E24B4A">T ~ 2% (sustained)</text>
<rect x="40" y="440" width="600" height="190" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text class="th" x="340" y="466" text-anchor="middle">Design paradox: why low T is desirable</text>
<text class="ts" x="60" y="492">tau_decay = 2*m_string / (T_coeff * Z_bridge)</text>
<text class="ts" x="60" y="514">Higher T -> faster energy drain -> shorter sustain</text>
<text class="ts" x="60" y="536">Lower T -> slower energy drain -> longer sustain</text>
<text class="ts" x="60" y="564" fill="#1D9E75">Piano: highest T -> compensated by massive string mass</text>
<text class="ts" x="60" y="584" fill="#E24B4A">Guitar: moderate T -> sustain 2-5s by design</text>
<text class="ts" x="60" y="604" fill="#7F77DD">Violin: lowest T -> bow continuously replenishes energy</text>
</svg>
