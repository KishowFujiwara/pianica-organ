<rect x="50" y="184" width="26" height="12" rx="4" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
<line x1="26" y1="190" x2="48" y2="190" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>
