<text class="ts" x="609" y="278" text-anchor="middle" fill="#854F0B">ABS+sponge+case</text>
<text class="ts" x="609" y="290" text-anchor="middle" fill="#854F0B">Gamma=93</text>
<line x1="493" y1="280" x2="542" y2="274" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 2"/>
<circle cx="493" cy="280" r="2" fill="#854F0B"/>
