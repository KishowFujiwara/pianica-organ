<svg width="680" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>text{font-family:Arial,sans-serif}.th{font-size:14px;font-weight:500;fill:#2C2C2A}.ts{font-size:12px;fill:#5F5E5A}</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="340" y="24" text-anchor="middle" style="font-size:15px">Melodica cross-section v3 (2-piece structure, final)</text>
