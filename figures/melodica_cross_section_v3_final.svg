<line x1="40" y1="380" x2="640" y2="380" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="340" y="402" text-anchor="middle">Power flow: 265mW -> 48mW -> 25.5mW -> 13.5mW -> 0.22mW</text>
