<!-- Airflow up -->
<line x1="204" y1="240" x2="204" y2="146" stroke="#5DCAA5" stroke-width="1" opacity="0.5" marker-end="url(#arrow)" stroke-dasharray="3 2"/>
<!-- ABS bottom wall -->
<rect x="70" y="274" width="422" height="6" rx="1" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
