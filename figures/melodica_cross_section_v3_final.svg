<rect x="290" y="304" width="3" height="28" rx="1" fill="white" opacity="0.3"/>
<rect x="335" y="304" width="3" height="28" rx="1" fill="white" opacity="0.3"/>
<rect x="380" y="304" width="3" height="28" rx="1" fill="white" opacity="0.3"/>
<rect x="425" y="304" width="3" height="28" rx="1" fill="white" opacity="0.3"/>
<rect x="470" y="304" width="3" height="28" rx="1" fill="white" opacity="0.3"/>
<text class="ts" x="290" y="356" text-anchor="middle">Sound: 0.22 mW (0.085%)</text>
