<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
text { font-family: Arial, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="340" y="24" text-anchor="middle" style="font-size:15px">Melodica cross-section: energy path model v2.0</text>
<!-- Layer 1 -->
<rect x="80" y="50" width="440" height="24" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="300" y="66" text-anchor="middle">Layer 1: white ABS cover (latch)</text>
<!-- Layer 2 -->
<rect x="60" y="86" width="480" height="220" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="300" y="104" text-anchor="middle">Layer 2: air chamber + reed plate assembly</text>
<!-- Keys -->
<rect x="100" y="112" width="30" height="30" rx="2" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="155" y="112" width="30" height="30" rx="2" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="210" y="112" width="30" height="30" rx="2" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="265" y="112" width="30" height="30" rx="2" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="320" y="112" width="30" height="30" rx="2" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="135" y="112" width="18" height="20" rx="1" fill="#444" opacity="0.7"/>
<rect x="245" y="112" width="18" height="20" rx="1" fill="#444" opacity="0.7"/>
<!-- Valve -->
<circle cx="225" cy="144" r="4" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="225" y="138" text-anchor="middle" fill="#0F6E56">open</text>
<!-- Reed plate -->
<rect x="85" y="160" width="350" height="8" rx="1" fill="#D4A520" stroke="#996515" stroke-width="0.5"/>
<text class="ts" x="260" y="158" text-anchor="middle" fill="#996515">Reed plate (brass / phosphor bronze)</text>
<!-- Reeds -->
<rect x="218" y="168" width="14" height="3" rx="0.5" fill="#EF9F27" stroke="#854F0B" stroke-width="0.5"/>
<path d="M216 174 Q220 178 224 174 Q228 170 232 174" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.7"/>
<!-- Partitions -->
<line x1="90" y1="168" x2="90" y2="280" stroke="#888" stroke-width="1.5" opacity="0.5"/>
<line x1="145" y1="168" x2="145" y2="280" stroke="#888" stroke-width="1.5" opacity="0.5"/>
<line x1="200" y1="168" x2="200" y2="280" stroke="#888" stroke-width="1.5" opacity="0.5"/>
<line x1="255" y1="168" x2="255" y2="280" stroke="#888" stroke-width="1.5" opacity="0.5"/>
<line x1="310" y1="168" x2="310" y2="280" stroke="#888" stroke-width="1.5" opacity="0.5"/>
<line x1="365" y1="168" x2="365" y2="280" stroke="#888" stroke-width="1.5" opacity="0.5"/>
<!-- ABS bottom -->
<rect x="82" y="278" width="356" height="6" rx="1" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="260" y="275" text-anchor="middle">White ABS air chamber bottom</text>
<!-- Gasket -->
<rect x="82" y="284" width="356" height="3" rx="0.5" fill="#444" opacity="0.6"/>
<!-- Sponge -->
<rect x="82" y="294" width="356" height="6" rx="1" fill="#333" stroke="#555" stroke-width="0.3" stroke-dasharray="2 2"/>
<text class="ts" x="260" y="310" text-anchor="middle">Black sponge (eta=0.3-0.5)</text>
<!-- Layer 3 -->
<rect x="60" y="318" width="480" height="40" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="300" y="342" text-anchor="middle" fill="#0C447C">Layer 3: blue ABS bottom case (slits)</text>
<!-- Slits -->
<rect x="120" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="150" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="180" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="210" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="240" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="270" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="300" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="330" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<rect x="360" y="325" width="3" height="26" rx="1" fill="white" opacity="0.4"/>
<!-- Mouthpiece -->
<rect x="440" y="200" width="100" height="14" rx="4" fill="#FAFAF8" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="490" y="196" text-anchor="middle">Mouthpiece</text>
<line x1="540" y1="207" x2="450" y2="207" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="550" y="210" fill="#0F6E56">Breath</text>
<!-- BN annotations -->
<rect x="462" y="160" width="198" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="561" y="176" text-anchor="middle" fill="#712B13">BN1: 82% loss</text>
<text class="ts" x="561" y="192" text-anchor="middle" fill="#993C1D">DC->AC (unavoidable)</text>
<line x1="436" y1="170" x2="460" y2="176" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="3 2"/>
<rect x="462" y="218" width="198" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="561" y="236" text-anchor="middle" fill="#3C3489">BN2: 47% loss</text>
<text class="ts" x="561" y="252" text-anchor="middle" fill="#534AB7">Plate -> ABS walls</text>
<text class="ts" x="561" y="264" text-anchor="middle" fill="#534AB7">31 partitions = 88%</text>
<line x1="370" y1="230" x2="460" y2="240" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 2"/>
<rect x="462" y="288" width="198" height="52" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="561" y="306" text-anchor="middle" fill="#633806">BN3: 99% loss</text>
<text class="ts" x="561" y="322" text-anchor="middle" fill="#854F0B">Double wall + sponge</text>
<text class="ts" x="561" y="334" text-anchor="middle" fill="#854F0B">Gamma=93 (ABS)</text>
<line x1="440" y1="300" x2="460" y2="310" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 2"/>
<!-- B-path -->
<line x1="227" y1="168" x2="227" y2="225" stroke="#7F77DD" stroke-width="1.5" opacity="0.6"/>
<text class="ts" x="238" y="210" fill="#534AB7">B2c</text>
<!-- Output -->
<text class="ts" x="300" y="378" text-anchor="middle">External air -> Sound (0.22 mW, 0.085%)</text>
<!-- Power flow -->
<line x1="60" y1="400" x2="620" y2="400" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="340" y="424" text-anchor="middle">Power flow summary</text>
<rect x="40" y="440" width="80" height="36" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="80" y="436" text-anchor="middle">Breath</text>
<text class="ts" x="80" y="462" text-anchor="middle">265 mW</text>
<line x1="120" y1="458" x2="140" y2="458" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="142" y="440" width="80" height="36" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="182" y="436" text-anchor="middle" fill="#993C1D">Reed</text>
<text class="ts" x="182" y="462" text-anchor="middle" fill="#712B13">48 mW</text>
<text class="ts" x="132" y="488" fill="#993C1D">-82%</text>
<line x1="222" y1="458" x2="242" y2="458" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="244" y="440" width="80" height="36" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="284" y="436" text-anchor="middle" fill="#534AB7">Plate</text>
<text class="ts" x="284" y="462" text-anchor="middle" fill="#3C3489">25.5 mW</text>
<text class="ts" x="234" y="488" fill="#534AB7">-47%</text>
<line x1="324" y1="458" x2="344" y2="458" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="346" y="440" width="80" height="36" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="386" y="436" text-anchor="middle" fill="#854F0B">ABS wall</text>
<text class="ts" x="386" y="462" text-anchor="middle" fill="#633806">13.5 mW</text>
<text class="ts" x="336" y="488" fill="#854F0B">-99%</text>
<line x1="426" y1="458" x2="446" y2="458" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="448" y="440" width="90" height="36" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="ts" x="493" y="436" text-anchor="middle" fill="#3B6D11">Sound</text>
<text class="ts" x="493" y="462" text-anchor="middle" fill="#27500A">0.22 mW</text>
<text class="ts" x="493" y="488" fill="#3B6D11">0.085%</text>
<!-- v3 -->
<rect x="40" y="520" width="560" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="320" y="540" text-anchor="middle" fill="#27500A">v3: Replace blue ABS + sponge with kiri bonded to white ABS</text>
<text class="ts" x="320" y="558" text-anchor="middle" fill="#3B6D11">ABS->kiri T=96.5% | Gamma 93->1.8 | +13 dB | Target 85 dB SPL @1m</text>
</svg>
