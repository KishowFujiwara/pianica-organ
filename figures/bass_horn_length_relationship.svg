<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720" width="680" height="720" font-family="sans-serif">
  <title>低音とホーン長の物理的関係</title>
  <desc>波長、閉管共鳴、指数ホーンの3つの規範で管長を比較</desc>

  <text x="40" y="34" font-size="14" font-weight="500" fill="#2C2C2A">低音とホーン長の関係</text>
  <line x1="40" y1="54" x2="640" y2="54" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="80" font-size="12" fill="#5F5E5A">基本: λ = c/f、c = 340 m/s、低音ほど波長が長い</text>

  <text x="40" y="110" font-size="14" font-weight="500" fill="#534AB7">3つの規範での管長</text>

  <text x="60" y="134" font-size="12" fill="#5F5E5A">音</text>
  <text x="130" y="134" font-size="12" text-anchor="middle" fill="#5F5E5A">波長 λ</text>
  <text x="220" y="134" font-size="12" text-anchor="middle" fill="#5F5E5A">閉管 L=λ/4</text>
  <text x="330" y="134" font-size="12" text-anchor="middle" fill="#5F5E5A">開管 L=λ/2</text>
  <text x="460" y="134" font-size="12" text-anchor="middle" fill="#5F5E5A">指数ホーン</text>
  <text x="460" y="148" font-size="12" text-anchor="middle" fill="#5F5E5A">(S/S0=2)</text>
  <text x="580" y="134" font-size="12" text-anchor="middle" fill="#5F5E5A">実用推奨</text>

  <line x1="40" y1="158" x2="640" y2="158" stroke="#888780" stroke-width="0.3"/>

  <text x="60" y="180" font-size="12" fill="#5F5E5A">C2(65Hz)</text>
  <text x="130" y="180" font-size="12" text-anchor="middle" fill="#5F5E5A">5.23m</text>
  <text x="220" y="180" font-size="12" text-anchor="middle" fill="#D85A30">1307mm</text>
  <text x="330" y="180" font-size="12" text-anchor="middle" fill="#D85A30">2615mm</text>
  <text x="460" y="180" font-size="12" text-anchor="middle" fill="#0F6E56">408mm</text>
  <text x="580" y="180" font-size="12" text-anchor="middle" fill="#0F6E56">折り返し</text>

  <text x="60" y="200" font-size="12" fill="#5F5E5A">C3(131Hz)</text>
  <text x="130" y="200" font-size="12" text-anchor="middle" fill="#5F5E5A">2.60m</text>
  <text x="220" y="200" font-size="12" text-anchor="middle" fill="#D85A30">650mm</text>
  <text x="330" y="200" font-size="12" text-anchor="middle" fill="#D85A30">1300mm</text>
  <text x="460" y="200" font-size="12" text-anchor="middle" fill="#0F6E56">203mm</text>
  <text x="580" y="200" font-size="12" text-anchor="middle" fill="#0F6E56">直管可</text>

  <text x="60" y="220" font-size="12" fill="#5F5E5A">C4(262Hz)</text>
  <text x="130" y="220" font-size="12" text-anchor="middle" fill="#5F5E5A">1.30m</text>
  <text x="220" y="220" font-size="12" text-anchor="middle" fill="#5F5E5A">325mm</text>
  <text x="330" y="220" font-size="12" text-anchor="middle" fill="#5F5E5A">649mm</text>
  <text x="460" y="220" font-size="12" text-anchor="middle" fill="#0F6E56">101mm</text>
  <text x="580" y="220" font-size="12" text-anchor="middle" fill="#0F6E56">直管可</text>

  <text x="60" y="240" font-size="12" fill="#5F5E5A">C5(523Hz)</text>
  <text x="130" y="240" font-size="12" text-anchor="middle" fill="#5F5E5A">0.65m</text>
  <text x="220" y="240" font-size="12" text-anchor="middle" fill="#5F5E5A">162mm</text>
  <text x="330" y="240" font-size="12" text-anchor="middle" fill="#5F5E5A">325mm</text>
  <text x="460" y="240" font-size="12" text-anchor="middle" fill="#0F6E56">51mm</text>
  <text x="580" y="240" font-size="12" text-anchor="middle" fill="#0F6E56">容易</text>

  <text x="60" y="260" font-size="12" fill="#5F5E5A">C6(1047Hz)</text>
  <text x="130" y="260" font-size="12" text-anchor="middle" fill="#5F5E5A">0.32m</text>
  <text x="220" y="260" font-size="12" text-anchor="middle" fill="#5F5E5A">81mm</text>
  <text x="330" y="260" font-size="12" text-anchor="middle" fill="#5F5E5A">162mm</text>
  <text x="460" y="260" font-size="12" text-anchor="middle" fill="#0F6E56">25mm</text>
  <text x="580" y="260" font-size="12" text-anchor="middle" fill="#0F6E56">省略可</text>

  <line x1="40" y1="290" x2="640" y2="290" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="316" font-size="14" font-weight="500" fill="#0F6E56">指数ホーンが短くて済む理由</text>

  <text x="40" y="338" font-size="12" fill="#5F5E5A">1. カットオフ fc = mc/(4π) は広がり率 m で決まる</text>
  <text x="40" y="356" font-size="12" fill="#5F5E5A">2. 管長 L は開口面積比 S(L)/S0 から独立に設計可能</text>
  <text x="40" y="374" font-size="12" fill="#5F5E5A">3. 閉管/開管規範の 1/3〜1/5 の短さで同じ音域を放射</text>

  <line x1="40" y1="394" x2="640" y2="394" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="420" font-size="14" font-weight="500" fill="#D85A30">低音が長くなる本質的理由(指数ホーンでも)</text>

  <rect x="40" y="438" width="600" height="90" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5" rx="4"/>
  <text x="50" y="462" font-size="12" fill="#501313">理由1: 放射効率には開口径 a > λ/6 が必要</text>
  <text x="50" y="482" font-size="12" fill="#501313">理由2: 低音では m を小さくするためホーンが平坦に</text>
  <text x="50" y="502" font-size="12" fill="#501313">理由3: 実用最小長 L > λ/4 の制約(放射端効果)</text>
  <text x="50" y="522" font-size="12" fill="#501313">-> 指数ホーンでも、完全に λ と無関係ではない</text>

  <line x1="40" y1="548" x2="640" y2="548" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="574" font-size="14" font-weight="500" fill="#BA7517">実用的な対処法</text>

  <rect x="40" y="592" width="140" height="80" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" rx="4"/>
  <text x="110" y="614" font-size="14" font-weight="500" text-anchor="middle" fill="#633806">折り返し</text>
  <text x="110" y="632" font-size="12" text-anchor="middle" fill="#633806">U字構造</text>
  <text x="110" y="648" font-size="12" text-anchor="middle" fill="#633806">物理サイズ</text>
  <text x="110" y="664" font-size="12" text-anchor="middle" fill="#633806">1/2に圧縮</text>

  <rect x="195" y="592" width="140" height="80" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" rx="4"/>
  <text x="265" y="614" font-size="14" font-weight="500" text-anchor="middle" fill="#633806">開口縮小</text>
  <text x="265" y="632" font-size="12" text-anchor="middle" fill="#633806">S/S0=2で妥協</text>
  <text x="265" y="648" font-size="12" text-anchor="middle" fill="#633806">低音音量</text>
  <text x="265" y="664" font-size="12" text-anchor="middle" fill="#633806">-3〜6dB</text>

  <rect x="350" y="592" width="140" height="80" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" rx="4"/>
  <text x="420" y="614" font-size="14" font-weight="500" text-anchor="middle" fill="#633806">響板補完</text>
  <text x="420" y="632" font-size="12" text-anchor="middle" fill="#633806">松天板で</text>
  <text x="420" y="648" font-size="12" text-anchor="middle" fill="#633806">低音を二次放射</text>
  <text x="420" y="664" font-size="12" text-anchor="middle" fill="#633806">ピアノ式</text>

  <rect x="505" y="592" width="135" height="80" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" rx="4"/>
  <text x="572" y="614" font-size="14" font-weight="500" text-anchor="middle" fill="#633806">音域制限</text>
  <text x="572" y="632" font-size="12" text-anchor="middle" fill="#633806">C3以上に</text>
  <text x="572" y="648" font-size="12" text-anchor="middle" fill="#633806">抑えて実用</text>
  <text x="572" y="664" font-size="12" text-anchor="middle" fill="#633806">サイズ優先</text>

  <text x="40" y="700" font-size="12" fill="#888780">F3〜F6の37鍵なら実用管長 38〜486mm、折り返しで1mサイズに収まる</text>
</svg>
