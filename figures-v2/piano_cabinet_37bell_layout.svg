<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="sans-serif">
  <style>
    .title { font-size: 18px; font-weight: bold; }
    .sub { font-size: 13px; font-weight: bold; }
    .label { font-size: 12px; }
    .small { font-size: 11px; fill: #555; }
    .tiny { font-size: 10px; fill: #666; }
    .cabinet { fill: #f0e8d8; stroke: #5a3a1a; stroke-width: 2.5; }
    .low { fill: #c8d8e8; stroke: #1a4a6a; stroke-width: 1.2; }
    .mid { fill: #d8e8c8; stroke: #4a7a1a; stroke-width: 1.2; }
    .high { fill: #f0e0b8; stroke: #7a5a1a; stroke-width: 1.2; }
    .piano { fill: #fffaf0; stroke: #333; stroke-width: 1; }
    .sound { fill: #e8c8f0; stroke: #5a1a7a; stroke-width: 1.5; }
    .reed { fill: #2a6a8a; }
    .box { fill: #f8f4ec; stroke: #555; stroke-width: 1; }
    .dim { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#dimA); marker-start: url(#dimA); }
  </style>
  <defs>
    <marker id="dimA" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2,2 L8,5 L2,8 z" fill="#666"/>
    </marker>
  </defs>

  <text x="450" y="26" text-anchor="middle" class="title">ピアノ筐体内 -- 37ベル配置案 (正面透視図)</text>

  <!-- ピアノ筐体輪郭 -->
  <rect x="50" y="60" width="800" height="460" class="cabinet" rx="5"/>

  <!-- 寸法表示 -->
  <line x1="50" y1="545" x2="850" y2="545" class="dim"/>
  <text x="450" y="562" text-anchor="middle" class="label">幅 1500 mm</text>

  <line x1="30" y1="60" x2="30" y2="520" class="dim"/>
  <text x="18" y="295" text-anchor="middle" class="label" transform="rotate(-90 18 295)">高さ 1200 mm</text>

  <!-- 上部: 高音域ベル (C5-C6 相当, 小型, 螺旋または直管) -->
  <text x="450" y="85" text-anchor="middle" class="sub">上段: 高音域 (f &gt; 400 Hz) -- 直管または小螺旋</text>
  <g id="high-bells">
    <!-- 12個の小ベル -->
    <g>
      <circle cx="95" cy="115" r="12" class="high"/>
      <circle cx="125" cy="115" r="12" class="high"/>
      <circle cx="155" cy="115" r="12" class="high"/>
      <circle cx="185" cy="115" r="12" class="high"/>
      <circle cx="215" cy="115" r="12" class="high"/>
      <circle cx="245" cy="115" r="12" class="high"/>
      <circle cx="275" cy="115" r="12" class="high"/>
      <circle cx="305" cy="115" r="12" class="high"/>
      <circle cx="335" cy="115" r="12" class="high"/>
      <circle cx="365" cy="115" r="12" class="high"/>
      <circle cx="395" cy="115" r="12" class="high"/>
      <circle cx="425" cy="115" r="12" class="high"/>
      <circle cx="455" cy="115" r="12" class="high"/>
    </g>
    <text x="95" y="140" class="tiny" text-anchor="middle">C6</text>
    <text x="455" y="140" class="tiny" text-anchor="middle">C5</text>
  </g>

  <!-- 中段: 中音域ベル (C4-B4, U字折り返し) -->
  <text x="450" y="175" text-anchor="middle" class="sub">中段: 中音域 (200-400 Hz) -- U字折り返し</text>
  <g id="mid-bells">
    <!-- 12個のU字ホーン断面 -->
    <g transform="translate(95, 200)">
      <path d="M 0 0 L 30 0 L 30 40 L 50 40 L 50 50 L 20 50 L 20 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(155, 200)">
      <path d="M 0 0 L 30 0 L 30 40 L 50 40 L 50 50 L 20 50 L 20 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(215, 200)">
      <path d="M 0 0 L 32 0 L 32 42 L 54 42 L 54 52 L 22 52 L 22 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(280, 200)">
      <path d="M 0 0 L 34 0 L 34 44 L 58 44 L 58 54 L 24 54 L 24 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(350, 200)">
      <path d="M 0 0 L 36 0 L 36 46 L 62 46 L 62 56 L 26 56 L 26 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(425, 200)">
      <path d="M 0 0 L 38 0 L 38 48 L 66 48 L 66 58 L 28 58 L 28 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(505, 200)">
      <path d="M 0 0 L 40 0 L 40 50 L 70 50 L 70 60 L 30 60 L 30 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(590, 200)">
      <path d="M 0 0 L 42 0 L 42 52 L 74 52 L 74 62 L 32 62 L 32 10 L 0 10 Z" class="mid"/>
    </g>
    <g transform="translate(680, 200)">
      <path d="M 0 0 L 44 0 L 44 54 L 78 54 L 78 64 L 34 64 L 34 10 L 0 10 Z" class="mid"/>
    </g>
    <text x="120" y="278" class="tiny" text-anchor="middle">B4</text>
    <text x="714" y="278" class="tiny" text-anchor="middle">C4</text>
  </g>

  <!-- 下段: 低音域ベル (C3-B3, 大型W字) -->
  <text x="450" y="305" text-anchor="middle" class="sub">下段: 低音域 (100-200 Hz) -- W字 2回折り返し</text>
  <g id="low-bells">
    <!-- 12個の W字ホーン -->
    <g transform="translate(75, 325)">
      <path d="M 0 0 L 35 0 L 35 30 L 20 30 L 20 55 L 50 55 L 50 85 L 35 85 L 35 65 L 10 65 L 10 35 L 25 35 L 25 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(135, 325)">
      <path d="M 0 0 L 37 0 L 37 32 L 22 32 L 22 57 L 54 57 L 54 87 L 39 87 L 39 67 L 12 67 L 12 37 L 27 37 L 27 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(200, 325)">
      <path d="M 0 0 L 39 0 L 39 34 L 24 34 L 24 59 L 58 59 L 58 89 L 43 89 L 43 69 L 14 69 L 14 39 L 29 39 L 29 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(270, 325)">
      <path d="M 0 0 L 41 0 L 41 36 L 26 36 L 26 61 L 62 61 L 62 91 L 47 91 L 47 71 L 16 71 L 16 41 L 31 41 L 31 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(345, 325)">
      <path d="M 0 0 L 43 0 L 43 38 L 28 38 L 28 63 L 66 63 L 66 93 L 51 93 L 51 73 L 18 73 L 18 43 L 33 43 L 33 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(425, 325)">
      <path d="M 0 0 L 45 0 L 45 40 L 30 40 L 30 65 L 70 65 L 70 95 L 55 95 L 55 75 L 20 75 L 20 45 L 35 45 L 35 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(515, 325)">
      <path d="M 0 0 L 47 0 L 47 42 L 32 42 L 32 67 L 74 67 L 74 97 L 59 97 L 59 77 L 22 77 L 22 47 L 37 47 L 37 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(610, 325)">
      <path d="M 0 0 L 49 0 L 49 44 L 34 44 L 34 69 L 78 69 L 78 99 L 63 99 L 63 79 L 24 79 L 24 49 L 39 49 L 39 10 L 0 10 Z" class="low"/>
    </g>
    <g transform="translate(710, 325)">
      <path d="M 0 0 L 51 0 L 51 46 L 36 46 L 36 71 L 82 71 L 82 101 L 67 101 L 67 81 L 26 81 L 26 51 L 41 51 L 41 10 L 0 10 Z" class="low"/>
    </g>
    <text x="100" y="445" class="tiny" text-anchor="middle">B3</text>
    <text x="755" y="445" class="tiny" text-anchor="middle">C3</text>
  </g>

  <!-- 鍵盤 -->
  <rect x="80" y="470" width="740" height="40" class="piano"/>
  <g>
    <line x1="110" y1="470" x2="110" y2="510" stroke="#333"/>
    <line x1="140" y1="470" x2="140" y2="510" stroke="#333"/>
    <line x1="170" y1="470" x2="170" y2="510" stroke="#333"/>
    <line x1="200" y1="470" x2="200" y2="510" stroke="#333"/>
    <line x1="230" y1="470" x2="230" y2="510" stroke="#333"/>
    <line x1="260" y1="470" x2="260" y2="510" stroke="#333"/>
    <line x1="290" y1="470" x2="290" y2="510" stroke="#333"/>
    <line x1="320" y1="470" x2="320" y2="510" stroke="#333"/>
    <line x1="350" y1="470" x2="350" y2="510" stroke="#333"/>
    <line x1="380" y1="470" x2="380" y2="510" stroke="#333"/>
    <line x1="410" y1="470" x2="410" y2="510" stroke="#333"/>
    <line x1="440" y1="470" x2="440" y2="510" stroke="#333"/>
    <line x1="470" y1="470" x2="470" y2="510" stroke="#333"/>
    <line x1="500" y1="470" x2="500" y2="510" stroke="#333"/>
    <line x1="530" y1="470" x2="530" y2="510" stroke="#333"/>
    <line x1="560" y1="470" x2="560" y2="510" stroke="#333"/>
    <line x1="590" y1="470" x2="590" y2="510" stroke="#333"/>
    <line x1="620" y1="470" x2="620" y2="510" stroke="#333"/>
    <line x1="650" y1="470" x2="650" y2="510" stroke="#333"/>
    <line x1="680" y1="470" x2="680" y2="510" stroke="#333"/>
    <line x1="710" y1="470" x2="710" y2="510" stroke="#333"/>
    <line x1="740" y1="470" x2="740" y2="510" stroke="#333"/>
    <line x1="770" y1="470" x2="770" y2="510" stroke="#333"/>
    <line x1="800" y1="470" x2="800" y2="510" stroke="#333"/>
  </g>
  <text x="450" y="497" text-anchor="middle" class="label">37鍵盤 (C3 -- C6)</text>

  <!-- 下の説明 -->
  <rect x="40" y="580" width="820" height="90" rx="6" class="box"/>
  <text x="55" y="604" class="sub">配置上の要点</text>
  <text x="55" y="624" class="label">[1] 高音ほどホーンが短く小型 -- 上段に配置、直管または緩い螺旋で十分</text>
  <text x="55" y="642" class="label">[2] 低音域はベル長1m超になるため W字2回折り返し必須 -- 下段全幅を使用</text>
  <text x="55" y="660" class="label">[3] 同音域内でも半音毎に m を個別最適化 -- 隣接ベル同士の音響結合を避けるため仕切り板を挿入</text>
</svg>
