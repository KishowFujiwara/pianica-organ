<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720" width="680" height="720" font-family="sans-serif">
  <title>上流ホーンと下流ホーンの二重構造</title>
  <desc>空気室側(上流)にホーン的共鳴管を追加するとリード管楽器に近づく</desc>

  <text x="40" y="34" font-size="14" font-weight="500" fill="#2C2C2A">空気室にホーンを付ける提案</text>
  <line x1="40" y1="54" x2="640" y2="54" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="80" font-size="14" font-weight="500" fill="#534AB7">物理: リード管楽器(パイプオルガン)と同じ構造</text>

  <path d="M 60,120 L 80,120 L 80,160 L 60,160 Z" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="70" y="180" font-size="12" text-anchor="middle" fill="#0C447C">吹き口</text>

  <path d="M 80,120 L 200,105 L 200,175 L 80,160 Z" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="140" y="145" font-size="12" text-anchor="middle" fill="#3C3489">上流ホーン</text>
  <text x="140" y="163" font-size="12" text-anchor="middle" fill="#3C3489">(共鳴管)</text>

  <rect x="200" y="120" width="40" height="40" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="220" y="180" font-size="12" text-anchor="middle" fill="#4A1B0C">リード</text>

  <path d="M 240,120 L 360,105 L 360,175 L 240,160 Z" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="300" y="145" font-size="12" text-anchor="middle" fill="#854F0B">下流ホーン</text>
  <text x="300" y="163" font-size="12" text-anchor="middle" fill="#854F0B">(放射管)</text>

  <path d="M 370,130 L 400,120" stroke="#A32D2D" stroke-width="1.5"/>
  <path d="M 370,150 L 400,160" stroke="#A32D2D" stroke-width="1.5"/>
  <text x="410" y="148" font-size="12" fill="#A32D2D">音</text>

  <text x="440" y="140" font-size="12" fill="#5F5E5A">= クラリネット</text>
  <text x="440" y="158" font-size="12" fill="#5F5E5A">= オルガンリード管</text>

  <line x1="40" y1="200" x2="640" y2="200" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="226" font-size="14" font-weight="500" fill="#0F6E56">上流ホーンの3つの効果</text>

  <rect x="40" y="244" width="190" height="76" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" rx="4"/>
  <text x="135" y="266" font-size="14" font-weight="500" text-anchor="middle" fill="#04342C">共鳴結合</text>
  <text x="135" y="286" font-size="12" text-anchor="middle" fill="#04342C">f_cav と f_reed が</text>
  <text x="135" y="302" font-size="12" text-anchor="middle" fill="#04342C">ロックして基音安定</text>
  <text x="135" y="318" font-size="12" text-anchor="middle" fill="#04342C">音高ブレ減少</text>

  <rect x="245" y="244" width="190" height="76" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" rx="4"/>
  <text x="340" y="266" font-size="14" font-weight="500" text-anchor="middle" fill="#04342C">フォルマント形成</text>
  <text x="340" y="286" font-size="12" text-anchor="middle" fill="#04342C">特定周波数を強調</text>
  <text x="340" y="302" font-size="12" text-anchor="middle" fill="#04342C">母音的な音色</text>
  <text x="340" y="318" font-size="12" text-anchor="middle" fill="#04342C">オルガン感が出る</text>

  <rect x="450" y="244" width="190" height="76" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" rx="4"/>
  <text x="545" y="266" font-size="14" font-weight="500" text-anchor="middle" fill="#04342C">励振強化</text>
  <text x="545" y="286" font-size="12" text-anchor="middle" fill="#04342C">圧力変動がリードに</text>
  <text x="545" y="302" font-size="12" text-anchor="middle" fill="#04342C">ポジティブ帰還</text>
  <text x="545" y="318" font-size="12" text-anchor="middle" fill="#04342C">音量増大</text>

  <line x1="40" y1="340" x2="640" y2="340" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="366" font-size="14" font-weight="500" fill="#D85A30">実装の困難</text>

  <text x="40" y="392" font-size="12" fill="#5F5E5A">- 37鍵共通の空気室では1音だけが結合、他は結合しない</text>
  <text x="40" y="410" font-size="12" fill="#5F5E5A">- 音域ごとに専用共鳴管が必要 = パイプオルガンのリード管</text>
  <text x="40" y="428" font-size="12" fill="#5F5E5A">- 呼気変動との干渉で音が不安定化する可能性</text>

  <line x1="40" y1="448" x2="640" y2="448" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="474" font-size="14" font-weight="500" fill="#BA7517">推奨: 案C -- リード毎の短い共鳴セクション</text>

  <rect x="40" y="490" width="100" height="30" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5" rx="3"/>
  <text x="90" y="510" font-size="12" text-anchor="middle" fill="#0C447C">吹き口</text>

  <rect x="150" y="490" width="100" height="30" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" rx="3"/>
  <text x="200" y="510" font-size="12" text-anchor="middle" fill="#3C3489">空気室(リザーバ)</text>

  <rect x="260" y="490" width="80" height="30" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" rx="3"/>
  <text x="300" y="510" font-size="12" text-anchor="middle" fill="#854F0B">バルブ</text>

  <rect x="350" y="490" width="100" height="30" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8" rx="3"/>
  <text x="400" y="510" font-size="14" font-weight="500" text-anchor="middle" fill="#04342C">共鳴管(鍵毎)</text>

  <rect x="460" y="490" width="80" height="30" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5" rx="3"/>
  <text x="500" y="510" font-size="12" text-anchor="middle" fill="#712B13">リード</text>

  <rect x="550" y="490" width="90" height="30" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" rx="3"/>
  <text x="595" y="510" font-size="12" text-anchor="middle" fill="#854F0B">下流ホーン</text>

  <text x="40" y="548" font-size="12" fill="#5F5E5A">鍵毎に長さの異なる共鳴管を挿入。鍵毎の音域に合わせて基音を強化</text>
  <text x="40" y="566" font-size="12" fill="#5F5E5A">長さ L = c/(4·f_rear)、F4なら L ≈ 240mm、F5なら L ≈ 120mm</text>

  <line x1="40" y1="586" x2="640" y2="586" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="612" font-size="14" font-weight="500" fill="#2C2C2A">これが可能にすること</text>

  <text x="40" y="636" font-size="12" fill="#5F5E5A">- ピアニカがリード管楽器(クラリネット族、オルガンリードストップ)に変わる</text>
  <text x="40" y="654" font-size="12" fill="#5F5E5A">- 音色が「ピアニカ」から「オルガン」「トランペット」的に変化</text>
  <text x="40" y="672" font-size="12" fill="#5F5E5A">- 音量・音色・安定性が全て向上(下流ホーンと相乗)</text>
  <text x="40" y="690" font-size="12" fill="#5F5E5A">- ただし全長 500mm級の楽器になり、ピアニカの携帯性は失う</text>
</svg>
