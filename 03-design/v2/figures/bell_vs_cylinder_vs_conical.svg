<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720" width="680" height="720" font-family="sans-serif">
  <title>筒、円錐漏斗+筒、ベル(指数ホーン)の物理的比較</title>
  <desc>3つの形状の断面積変化、インピーダンス整合、放射効率を並列比較</desc>

  <text x="40" y="34" font-size="14" font-weight="500" fill="#2C2C2A">ベル形状の優位性: 3形状の物理比較</text>
  <line x1="40" y1="54" x2="640" y2="54" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="80" font-size="14" font-weight="500" fill="#534AB7">(A) 筒(直管)</text>
  <text x="40" y="98" font-size="12" fill="#5F5E5A">S(x) = 一定、開口端で断面積ジャンプ</text>

  <path d="M 100,120 L 100,160 L 300,160 L 300,120 Z" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="200" y="145" font-size="12" text-anchor="middle" fill="#444441">S = 一定</text>

  <line x1="310" y1="120" x2="340" y2="100" stroke="#A32D2D" stroke-width="1.5"/>
  <line x1="310" y1="160" x2="340" y2="180" stroke="#A32D2D" stroke-width="1.5"/>
  <text x="320" y="195" font-size="12" text-anchor="middle" fill="#A32D2D">断面ジャンプ</text>

  <rect x="380" y="105" width="240" height="70" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5" rx="4"/>
  <text x="500" y="125" font-size="12" text-anchor="middle" fill="#501313">開口端でインピーダンス不連続</text>
  <text x="500" y="143" font-size="12" text-anchor="middle" fill="#501313">反射70〜90%</text>
  <text x="500" y="161" font-size="12" text-anchor="middle" fill="#501313">放射効率: 1.0(基準)</text>

  <line x1="40" y1="210" x2="640" y2="210" stroke="#888780" stroke-width="0.3" stroke-dasharray="3 3"/>

  <text x="40" y="234" font-size="14" font-weight="500" fill="#BA7517">(B) 円錐漏斗+筒</text>
  <text x="40" y="252" font-size="12" fill="#5F5E5A">途中でテーパー->筒、dS/dx 不連続</text>

  <path d="M 100,274 L 100,314 L 180,314 L 240,304 L 300,294 L 300,294 L 300,274 Z" fill="#FAC775" stroke="#854F0B" stroke-width="0.8"/>
  <text x="150" y="298" font-size="12" text-anchor="middle" fill="#412402">筒</text>
  <text x="260" y="290" font-size="12" text-anchor="middle" fill="#412402">円錐</text>

  <circle cx="180" cy="290" r="3" fill="#A32D2D"/>
  <line x1="180" y1="290" x2="180" y2="250" stroke="#A32D2D" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="180" y="245" font-size="12" text-anchor="middle" fill="#A32D2D">不連続点</text>

  <rect x="380" y="260" width="240" height="70" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" rx="4"/>
  <text x="500" y="280" font-size="12" text-anchor="middle" fill="#633806">境界で部分反射</text>
  <text x="500" y="298" font-size="12" text-anchor="middle" fill="#633806">カットオフ不鮮明</text>
  <text x="500" y="316" font-size="12" text-anchor="middle" fill="#633806">放射効率: 3.5</text>

  <line x1="40" y1="355" x2="640" y2="355" stroke="#888780" stroke-width="0.3" stroke-dasharray="3 3"/>

  <text x="40" y="379" font-size="14" font-weight="500" fill="#0F6E56">(C) ベル(指数ホーン)</text>
  <text x="40" y="397" font-size="12" fill="#5F5E5A">S(x) = S0·exp(mx)、関数も微分も連続</text>

  <path d="M 100,418 C 140,416 180,414 220,410 C 260,404 280,395 290,380 L 290,380 L 290,434 C 280,419 260,410 220,404 C 180,400 140,398 100,396 Z" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="150" y="412" font-size="12" text-anchor="middle" fill="#04342C">滑らかな</text>
  <text x="170" y="426" font-size="12" text-anchor="middle" fill="#04342C">指数カーブ</text>

  <rect x="380" y="390" width="240" height="70" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" rx="4"/>
  <text x="500" y="410" font-size="12" text-anchor="middle" fill="#04342C">インピーダンス連続整合</text>
  <text x="500" y="428" font-size="12" text-anchor="middle" fill="#04342C">カットオフ明確 fc=mc/(4π)</text>
  <text x="500" y="446" font-size="12" text-anchor="middle" fill="#04342C">放射効率: 8〜10</text>

  <line x1="40" y1="485" x2="640" y2="485" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="511" font-size="14" font-weight="500" fill="#D85A30">結論: ベル形状(指数ホーン)が物理的に最適</text>

  <text x="40" y="534" font-size="12" fill="#5F5E5A">- 筒は反射が強く、鳴っても外に音が出ない</text>
  <text x="40" y="552" font-size="12" fill="#5F5E5A">- 円錐漏斗+筒は途中で不連続、ベルの効果が半減</text>
  <text x="40" y="570" font-size="12" fill="#5F5E5A">- ベル(指数)はインピーダンス連続、最大放射効率</text>

  <line x1="40" y1="590" x2="640" y2="590" stroke="#888780" stroke-width="0.3"/>

  <text x="40" y="614" font-size="14" font-weight="500" fill="#534AB7">おもちゃラッパ選定の指針</text>

  <text x="40" y="636" font-size="12" fill="#5F5E5A">OK: ビューグル型、トランペット型(マウスピースからベルまで連続テーパー)</text>
  <text x="40" y="654" font-size="12" fill="#5F5E5A">NG: ホイッスル型、笛型(単純な筒 or 不連続形状)</text>
  <text x="40" y="672" font-size="12" fill="#5F5E5A">注意: 正確な指数カーブでなくても近似で十分機能</text>

  <text x="40" y="700" font-size="12" fill="#888780">自作木製ホーンも、V字(直線テーパー)より指数カーブ近似を目指すべき</text>
</svg>
