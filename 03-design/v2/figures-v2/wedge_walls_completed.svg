<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="sans-serif">
  <defs>
    <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#dde4ea" stroke-width="0.5"/>
    </pattern>
    <marker id="orangeArrow2" markerUnits="userSpaceOnUse" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 L 3 6 Z" fill="#e07020"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="url(#grid2)"/>

  <text x="30" y="28" font-size="15" fill="#000" font-weight="bold">平面 (上から見た図) -- 楔形の両壁を明示</text>

  <!-- 筐体外枠 -->
  <rect x="40" y="50" width="640" height="340" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- ===== 下の楔形 (塗り) =====
       喉: ピアニカ右側 (195, 340) - 幅 50 (340 から筐体底 390)
       開口: 右端 (540, 260) - 幅 130 (260 から筐体底 390)
       下壁 = 筐体底面 y=390 -->
  <path d="M 195 340 L 540 260 L 540 390 L 195 390 Z" 
        fill="#e8f0f6" stroke="none" opacity="0.8"/>
  
  <!-- ===== 上の楔形 (塗り) =====
       喉: 右端 (640, 225) - 幅 175 (225 から筐体上 50) 
           ※ これは大きすぎるので、喉は実際には右端ではなく左端 (開口側) と読み替える可能性がある
       ここではスケッチ通り、2本の斜線と筐体上辺で囲む -->
  <path d="M 280 135 L 640 225 L 640 50 L 280 50 Z" 
        fill="#f6edf2" stroke="none" opacity="0.8"/>

  <!-- スケッチ通りの 斜線 (片壁) -->
  <line x1="195" y1="340" x2="540" y2="260" stroke="#2a6d8a" stroke-width="2.5"/>
  <line x1="280" y1="135" x2="640" y2="225" stroke="#2a6d8a" stroke-width="2.5"/>

  <!-- もう1枚の壁 (筐体上下辺) を太く赤で強調 -->
  <line x1="195" y1="390" x2="540" y2="390" stroke="#c33" stroke-width="3"/>
  <line x1="280" y1="50" x2="640" y2="50" stroke="#c33" stroke-width="3"/>

  <!-- 楔形の壁の注記 -->
  <text x="360" y="405" font-size="11" fill="#c33" font-weight="bold">下の楔形 もう1枚の壁 = 筐体底辺</text>
  <text x="460" y="45" font-size="11" fill="#c33" font-weight="bold">上の楔形 もう1枚の壁 = 筐体上辺</text>

  <!-- ピアニカ -->
  <rect x="52" y="340" width="140" height="42" fill="#f0e0c8" stroke="#333" stroke-width="1.2"/>
  <text x="122" y="367" text-anchor="middle" font-size="14" fill="#000">ピアニカ</text>

  <!-- 下の楔形の喉 (ピアニカ出口) と開口 (右端) の寸法線 -->
  <!-- 喉 -->
  <line x1="180" y1="340" x2="180" y2="390" stroke="#1a6a8a" stroke-width="1"/>
  <text x="160" y="370" font-size="10" fill="#1a6a8a" text-anchor="middle">喉 w&#x2080;</text>
  <!-- 開口 -->
  <line x1="555" y1="260" x2="555" y2="390" stroke="#1a6a8a" stroke-width="1"/>
  <text x="580" y="330" font-size="10" fill="#1a6a8a">下 開口 w&#x2081;</text>

  <!-- 上の楔形の喉と開口 -->
  <!-- 左端 開口 -->
  <line x1="265" y1="50" x2="265" y2="135" stroke="#7a1a5a" stroke-width="1"/>
  <text x="245" y="95" font-size="10" fill="#7a1a5a" text-anchor="middle">上 左端</text>
  <!-- 右端 (喉側) -->
  <line x1="655" y1="50" x2="655" y2="225" stroke="#7a1a5a" stroke-width="1"/>
  <text x="680" y="140" font-size="10" fill="#7a1a5a">上 右端</text>

  <!-- オレンジ矢印 (空気の流れ) -->
  <!-- 右下: 右から左に曲がって上へ -->
  <path d="M 570 300 L 510 300 Q 495 300 495 285 L 495 240"
        fill="none" stroke="#e07020" stroke-width="16" stroke-linecap="butt"
        marker-end="url(#orangeArrow2)"/>
  <text x="510" y="335" font-size="12" fill="#000">空気の流れ</text>

  <!-- 左上: 下から上に上がって右へ -->
  <path d="M 200 230 L 200 170 Q 200 155 215 155 L 260 155"
        fill="none" stroke="#e07020" stroke-width="16" stroke-linecap="butt"
        marker-end="url(#orangeArrow2)"/>
  <text x="155" y="265" font-size="12" fill="#000">空気の流れ</text>

  <!-- ===== 下部: 考察メモ ===== -->
  <rect x="40" y="420" width="640" height="90" fill="#f8f4ec" stroke="#555" stroke-width="1" rx="4"/>
  <text x="55" y="442" font-size="13" font-weight="bold" fill="#000">読み取り結果</text>
  <text x="55" y="463" font-size="11" fill="#444">- 下の楔形: 喉 = ピアニカ右側 (左端), 開口 = 右端。筐体底辺を下壁として利用</text>
  <text x="55" y="480" font-size="11" fill="#444">- 上の楔形: 喉 = ? 開口 = ? 方向が未確定 (空気の流れ矢印から推定する必要)</text>
  <text x="55" y="497" font-size="11" fill="#444">- 右端の折り返し: 下の楔形開口 -> 上の楔形へ接続</text>
</svg>
