<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" font-family="sans-serif">
  <defs>
    <pattern id="grid4" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#dde4ea" stroke-width="0.5"/>
    </pattern>
    <marker id="flArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a7"/>
    </marker>
  </defs>
  <rect width="900" height="800" fill="url(#grid4)"/>

  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#000">
    設計思想: 1本の長い楔形ホーンを3分割して筐体に収める
  </text>

  <!-- ===== (A) 元の長い楔形ホーン (展開時) ===== -->
  <text x="30" y="60" font-size="14" font-weight="bold" fill="#000">
    (A) 展開時の姿 -- 1本の線形楔形ホーン (軸長 2260 mm)
  </text>

  <g transform="translate(30, 75)">
    <!-- 展開楔形: 喉から開口まで単調に広がる -->
    <path d="M 10 80 L 840 30 L 840 130 L 10 80 Z" 
          fill="#e0edf5" stroke="#1a4a6a" stroke-width="1.5"/>
    <!-- 音響軸 -->
    <line x1="10" y1="80" x2="840" y2="80" stroke="#333" stroke-width="0.8" stroke-dasharray="4 3"/>

    <!-- 3つのセグメント境界 -->
    <line x1="290" y1="68" x2="290" y2="105" stroke="#c33" stroke-width="1.5" stroke-dasharray="3 2"/>
    <line x1="510" y1="55" x2="510" y2="118" stroke="#c33" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- 各セグメントのラベル -->
    <text x="150" y="95" font-size="12" font-weight="bold" fill="#1a4a6a">第1ホーン</text>
    <text x="150" y="110" font-size="10" fill="#1a4a6a">L1 = 810 mm</text>
    <text x="400" y="95" font-size="12" font-weight="bold" fill="#4a7a1a">第2ホーン</text>
    <text x="400" y="110" font-size="10" fill="#4a7a1a">L2 = 610 mm</text>
    <text x="650" y="95" font-size="12" font-weight="bold" fill="#7a1a4a">第3ホーン</text>
    <text x="650" y="110" font-size="10" fill="#7a1a4a">L3 = 840 mm</text>

    <!-- 喉と開口のラベル -->
    <text x="10" y="20" font-size="11" fill="#000">喉 w_0</text>
    <text x="10" y="32" font-size="10" fill="#555">117 mm</text>
    <text x="290" y="50" font-size="10" fill="#c33">w_1</text>
    <text x="290" y="62" font-size="9" fill="#888">~305</text>
    <text x="510" y="40" font-size="10" fill="#c33">w_2</text>
    <text x="510" y="52" font-size="9" fill="#888">~430</text>
    <text x="810" y="20" font-size="11" fill="#000">開口 w_3</text>
    <text x="810" y="32" font-size="10" fill="#555">~600 mm</text>

    <!-- 流れ方向 (展開時は単純に左->右の順流) -->
    <line x1="60" y1="80" x2="180" y2="80" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>
    <line x1="350" y1="80" x2="470" y2="80" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>
    <line x1="580" y1="80" x2="800" y2="80" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>

    <text x="420" y="160" font-size="11" fill="#444" text-anchor="middle">
      軸長 x に沿って断面積 S(x) は単調増加 (線形楔形)
    </text>
  </g>

  <!-- ===== 折り紙マーク ===== -->
  <text x="450" y="270" text-anchor="middle" font-size="15" fill="#c85a1a" font-weight="bold">
    &#x2193; 2回折りたたんで筐体に収める &#x2193;
  </text>

  <!-- ===== (B) 筐体内に折りたたんだ姿 ===== -->
  <text x="30" y="305" font-size="14" font-weight="bold" fill="#000">
    (B) 筐体内の折りたたみ姿 -- 平面 (上から見た図)
  </text>

  <g transform="translate(30, 320)">
    <!-- 筐体外枠 -->
    <rect x="10" y="10" width="640" height="340" fill="none" stroke="#333" stroke-width="1.5"/>

    <!-- 第1ホーン領域 -->
    <path d="M 165 300 L 510 220 L 510 350 L 165 350 Z" 
          fill="#e0edf5" stroke="none"/>
    <!-- 第2ホーン領域 -->
    <path d="M 510 220 L 510 100 L 250 100 L 165 300 Z" 
          fill="#edf5e5" stroke="none"/>
    <!-- 第3ホーン領域 -->
    <path d="M 250 95 L 610 185 L 610 10 L 250 10 Z" 
          fill="#f5e5ed" stroke="none"/>

    <!-- 斜線 (スケッチ通り) -->
    <line x1="165" y1="300" x2="510" y2="220" stroke="#2a6d8a" stroke-width="2"/>
    <line x1="250" y1="95" x2="610" y2="185" stroke="#2a6d8a" stroke-width="2"/>

    <!-- 筐体上下辺強調 -->
    <line x1="165" y1="350" x2="510" y2="350" stroke="#c33" stroke-width="3"/>
    <line x1="250" y1="10" x2="610" y2="10" stroke="#c33" stroke-width="3"/>

    <!-- ピアニカ -->
    <rect x="22" y="300" width="140" height="42" fill="#f0e0c8" stroke="#333" stroke-width="1.2"/>
    <text x="92" y="327" text-anchor="middle" font-size="13" fill="#000">ピアニカ</text>

    <!-- ホーン境界 (折り返し部) -->
    <!-- 第1->第2の折り返し (右下角) -->
    <path d="M 510 220 Q 560 220 575 170 Q 575 130 530 100" 
          fill="none" stroke="#e07020" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="585" y="165" font-size="10" fill="#e07020">折返1</text>

    <!-- 第2->第3の折り返し (左上角) -->
    <path d="M 165 300 Q 90 250 90 180 Q 90 120 250 95" 
          fill="none" stroke="#e07020" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="35" y="180" font-size="10" fill="#e07020">折返2</text>

    <!-- ラベル -->
    <text x="335" y="335" font-size="12" font-weight="bold" fill="#1a4a6a">第1ホーン</text>
    <text x="335" y="185" font-size="12" font-weight="bold" fill="#4a7a1a">第2ホーン</text>
    <text x="420" y="60" font-size="12" font-weight="bold" fill="#7a1a4a">第3ホーン</text>

    <!-- 流れ矢印 -->
    <line x1="200" y1="325" x2="280" y2="315" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>
    <line x1="350" y1="300" x2="430" y2="285" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>
    <line x1="450" y1="180" x2="360" y2="170" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>
    <line x1="330" y1="170" x2="240" y2="160" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>
    <line x1="290" y1="75" x2="380" y2="95" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>
    <line x1="430" y1="110" x2="540" y2="145" stroke="#2a7" stroke-width="2" marker-end="url(#flArrow)"/>

    <!-- 最終開口 -->
    <line x1="610" y1="10" x2="610" y2="185" stroke="#7a1a4a" stroke-width="3"/>
    <text x="620" y="100" font-size="10" fill="#7a1a4a">最終</text>
    <text x="620" y="112" font-size="10" fill="#7a1a4a">開口</text>
  </g>

  <!-- ===== (C) 重要な修正点 ===== -->
  <rect x="30" y="700" width="840" height="90" fill="#fff0e8" stroke="#e07020" stroke-width="1.5" rx="5"/>
  <text x="45" y="722" font-size="13" font-weight="bold" fill="#c85a1a">
    重要 -- 前回の考察からの修正
  </text>
  <text x="45" y="742" font-size="11" fill="#333">
    &#8226; これは独立した3つの楔形ではなく、1つの連続した楔形を3段に折り畳んだもの
  </text>
  <text x="45" y="760" font-size="11" fill="#333">
    &#8226; 音響軸に沿って断面積 S(x) は単調増加 (前回「波打って変化」とした考察は誤り)
  </text>
  <text x="45" y="778" font-size="11" fill="#333">
    &#8226; 流れが逆向きに見えるのは筐体座標系での話。ホーン軸座標系では常に「喉 -> 開口」の順流
  </text>
</svg>
