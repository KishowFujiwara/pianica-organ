<svg width="100%" viewBox="0 0 680 880" xmlns="http://www.w3.org/2000/svg" role="img">
<title>教会用リードオルガン 筐体三面図 (正面・側面・上面)</title>
<desc>共鳴箱 55x35x8cm の正面図・側面図・上面図 + 主要寸法</desc>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
.leader { stroke: #5F5E5A; stroke-width: 0.5; stroke-dasharray: 2 2; fill: none; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="dim" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 2L8 5L2 8" fill="context-stroke"/></marker>
</defs>

<text class="th" x="340" y="30" text-anchor="middle">教会用リードオルガン v3 -- 筐体三面図 (案C: 14.2L)</text>
<text class="ts" x="340" y="50" text-anchor="middle">外寸 550 x 350 x 80 mm / 矩形 + 内部曲面壁 + ギター流ボディ放射</text>

<text class="th" x="40" y="90">[1] 正面図 (Front View) - トップ板を見下ろす</text>

<rect x="60" y="110" width="540" height="340" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="ts" x="65" y="125">外寸 550 mm</text>

<rect x="80" y="130" width="500" height="300" rx="4" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="ts" x="85" y="143">内寸領域 (振動域) 502 x 302 mm</text>

<circle cx="330" cy="200" r="19" fill="none" stroke="#993C1D" stroke-width="2"/>
<text class="ts" x="330" y="205" text-anchor="middle" fill="#993C1D">SH d=38</text>

<line x1="180" y1="170" x2="480" y2="380" stroke="#5F5E5A" stroke-width="3" opacity="0.65"/>
<line x1="480" y1="170" x2="180" y2="380" stroke="#5F5E5A" stroke-width="3" opacity="0.65"/>
<text class="ts" x="190" y="165" fill="#5F5E5A">X-brace</text>
<text class="ts" x="445" y="165" fill="#5F5E5A">8x12mm</text>

<line x1="220" y1="140" x2="220" y2="420" stroke="#185FA5" stroke-width="3" opacity="0.6"/>
<text class="ts" x="135" y="285" fill="#185FA5" text-anchor="end">Bass bar</text>
<line x1="180" y1="285" x2="216" y2="285" class="leader"/>

<line x1="430" y1="160" x2="430" y2="400" stroke="#0F6E56" stroke-width="3" opacity="0.6"/>
<text class="ts" x="525" y="285" fill="#0F6E56">Tone bar</text>
<line x1="434" y1="285" x2="520" y2="285" class="leader"/>

<rect x="230" y="335" width="200" height="60" rx="2" fill="#D4A54A" stroke="#5C3D12" stroke-width="0.5" opacity="0.6"/>
<text class="ts" x="330" y="368" text-anchor="middle" fill="#5C3D12">Bridge patch (200x60x3mm)</text>
<text class="ts" x="330" y="385" text-anchor="middle" fill="#5C3D12">+ Reed plate 200x40mm</text>

<line x1="60" y1="465" x2="600" y2="465" stroke="#5F5E5A" stroke-width="0.5" marker-start="url(#dim)" marker-end="url(#dim)"/>
<text class="ts" x="330" y="478" text-anchor="middle">550 mm</text>

<line x1="615" y1="110" x2="615" y2="450" stroke="#5F5E5A" stroke-width="0.5" marker-start="url(#dim)" marker-end="url(#dim)"/>
<text class="ts" x="625" y="285">350</text>
<text class="ts" x="625" y="299">mm</text>

<text class="th" x="40" y="510">[2] 側面図 (Side View) - 高さ方向の断面</text>

<rect x="60" y="525" width="540" height="60" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>

<rect x="64" y="528" width="532" height="2" fill="#993C1D"/>
<text class="ts" x="70" y="540" fill="#993C1D">Top 1.5mm 桐</text>

<rect x="64" y="582" width="532" height="2" fill="#0C447C"/>
<text class="ts" x="70" y="578" fill="#0C447C">Back 2.0mm 桐</text>

<rect x="60" y="528" width="4" height="56" fill="#5F5E5A"/>
<rect x="596" y="528" width="4" height="56" fill="#5F5E5A"/>
<text class="ts" x="62" y="600" fill="#5F5E5A">Side 4mm</text>

<path d="M68 550 Q120 545 200 555 L390 555 Q470 545 592 550" stroke="#888780" stroke-width="0.5" fill="none" stroke-dasharray="2 2"/>
<text class="ts" x="330" y="552" text-anchor="middle" fill="#888780">内部空間 76mm</text>

<path d="M70 530 Q90 545 90 580" stroke="#085041" stroke-width="1.5" fill="none"/>
<path d="M590 530 Q570 545 570 580" stroke="#085041" stroke-width="1.5" fill="none"/>
<text class="ts" x="120" y="572" fill="#085041">曲面壁 R150</text>
<text class="ts" x="540" y="572" fill="#085041">曲面壁 R150</text>

<line x1="615" y1="525" x2="615" y2="585" stroke="#5F5E5A" stroke-width="0.5" marker-start="url(#dim)" marker-end="url(#dim)"/>
<text class="ts" x="630" y="558">80mm</text>

<text class="th" x="40" y="635">[3] 上面図 (Plan View) - バック板を見下ろす + ライニング</text>

<rect x="60" y="650" width="540" height="200" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<rect x="80" y="670" width="500" height="160" rx="4" fill="none" stroke="#5F5E5A" stroke-width="0.5"/>

<rect x="80" y="670" width="500" height="8" fill="#7F77DD" opacity="0.5"/>
<rect x="80" y="822" width="500" height="8" fill="#7F77DD" opacity="0.5"/>
<rect x="80" y="678" width="8" height="144" fill="#7F77DD" opacity="0.5"/>
<rect x="572" y="678" width="8" height="144" fill="#7F77DD" opacity="0.5"/>
<text class="ts" x="100" y="686" fill="#3C3489">Kerfed lining 20x8mm 全周</text>

<rect x="240" y="670" width="60" height="40" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="270" y="694" text-anchor="middle" fill="#085041">EB low</text>
<rect x="370" y="790" width="60" height="40" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="400" y="814" text-anchor="middle" fill="#085041">EB high</text>

<text class="ts" x="80" y="868" fill="#085041">Endblock 40x60x76mm 松 (低音側EB low / 高音側EB high)</text>

</svg>
