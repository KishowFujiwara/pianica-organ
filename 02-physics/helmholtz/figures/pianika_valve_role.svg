<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="680" height="540" font-family="sans-serif">
  <title>ピアニカのバルブの役割: 逆止弁</title>
  <desc>順方向は開、逆方向は閉。気流の一方向制御で音量確保・音の混濁防止・吸い込み音抑制</desc>
  <defs>
    <marker id="arv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="34" font-size="14" font-weight="500" fill="#2C2C2A">ピアニカのバルブ = 逆止弁(one-way valve)</text>
  <line x1="40" y1="54" x2="640" y2="54" stroke="#888780" stroke-width="0.5"/>

  <text x="170" y="80" font-size="14" font-weight="500" text-anchor="middle" fill="#0F6E56">順方向の流れ(吹く)</text>

  <rect x="90" y="100" width="160" height="30" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" rx="3"/>
  <text x="170" y="120" font-size="12" text-anchor="middle" fill="#04342C">空気室(高圧)</text>

  <line x1="150" y1="135" x2="190" y2="170" stroke="#1D9E75" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="135" r="3" fill="#04342C"/>

  <text x="100" y="175" font-size="12" fill="#0F6E56">バルブ開</text>

  <rect x="90" y="200" width="160" height="30" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5" rx="3"/>
  <text x="170" y="220" font-size="12" text-anchor="middle" fill="#712B13">リード(低圧)</text>

  <path d="M 170,138 L 170,198" stroke="#1D9E75" stroke-width="2" fill="none" marker-end="url(#arv)"/>

  <text x="170" y="255" font-size="12" text-anchor="middle" fill="#5F5E5A">差圧 &gt; 0、空気通過、リード鳴る</text>

  <line x1="340" y1="70" x2="340" y2="290" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

  <text x="510" y="80" font-size="14" font-weight="500" text-anchor="middle" fill="#D85A30">逆方向の流れ(吸う or 余韻)</text>

  <rect x="430" y="100" width="160" height="30" fill="#FBEAF0" stroke="#993556" stroke-width="0.5" rx="3"/>
  <text x="510" y="120" font-size="12" text-anchor="middle" fill="#4B1528">空気室(低圧)</text>

  <line x1="490" y1="135" x2="490" y2="170" stroke="#A32D2D" stroke-width="3" stroke-linecap="round"/>
  <circle cx="490" cy="135" r="3" fill="#4A1B0C"/>

  <text x="440" y="175" font-size="12" fill="#A32D2D">バルブ閉</text>

  <rect x="430" y="200" width="160" height="30" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5" rx="3"/>
  <text x="510" y="220" font-size="12" text-anchor="middle" fill="#0C447C">リード(高圧)</text>

  <line x1="510" y1="138" x2="510" y2="198" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>
  <text x="530" y="170" font-size="12" fill="#A32D2D">X</text>

  <text x="510" y="255" font-size="12" text-anchor="middle" fill="#5F5E5A">差圧 &lt; 0、バルブ密着、逆流阻止</text>

  <line x1="40" y1="300" x2="640" y2="300" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="326" font-size="14" font-weight="500" fill="#534AB7">バルブの3つの機能</text>

  <rect x="40" y="344" width="190" height="76" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" rx="4"/>
  <text x="135" y="366" font-size="14" font-weight="500" text-anchor="middle" fill="#3C3489">音量確保</text>
  <text x="135" y="386" font-size="12" text-anchor="middle" fill="#3C3489">空気漏れを防ぎ</text>
  <text x="135" y="402" font-size="12" text-anchor="middle" fill="#3C3489">リード駆動効率</text>
  <text x="135" y="416" font-size="12" text-anchor="middle" fill="#3C3489">+3〜6dB</text>

  <rect x="245" y="344" width="190" height="76" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" rx="4"/>
  <text x="340" y="366" font-size="14" font-weight="500" text-anchor="middle" fill="#3C3489">リリース整形</text>
  <text x="340" y="386" font-size="12" text-anchor="middle" fill="#3C3489">鍵を離した瞬間</text>
  <text x="340" y="402" font-size="12" text-anchor="middle" fill="#3C3489">気流を遮断</text>
  <text x="340" y="416" font-size="12" text-anchor="middle" fill="#3C3489">音がすぐ止まる</text>

  <rect x="450" y="344" width="190" height="76" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" rx="4"/>
  <text x="545" y="366" font-size="14" font-weight="500" text-anchor="middle" fill="#3C3489">吸込時の保護</text>
  <text x="545" y="386" font-size="12" text-anchor="middle" fill="#3C3489">誤って吸っても</text>
  <text x="545" y="402" font-size="12" text-anchor="middle" fill="#3C3489">音が出ない</text>
  <text x="545" y="416" font-size="12" text-anchor="middle" fill="#3C3489">唾液の逆流も防ぐ</text>

  <line x1="40" y1="440" x2="640" y2="440" stroke="#888780" stroke-width="0.5"/>

  <text x="40" y="464" font-size="12" fill="#5F5E5A">ハーモニカでは「ウィンドセーバー(windsaver)」と呼ばれる同型部品</text>
  <text x="40" y="482" font-size="12" fill="#5F5E5A">材質: 薄いプラスチック、革、紙。片持ち構造で気流で自動開閉</text>
  <text x="40" y="500" font-size="12" fill="#5F5E5A">共振周波数 fv = (1/2π)√(k/m) はリード基音の2倍以上に設計</text>
  <text x="40" y="518" font-size="12" fill="#5F5E5A">リードオルガン設計にも必要。リード毎に1個、気密性が音量を決める</text>
</svg>
