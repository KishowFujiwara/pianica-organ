<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="680" height="520" font-family="sans-serif">
  <title>柱バッフル型リード構造の観測</title>
  <desc>加圧室・リード露出・柱2本による音響バッフル配置と放射経路</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="34" font-size="14" font-weight="500" fill="#2C2C2A">柱バッフル型リード構造: 観測と放射経路</text>

  <rect x="170" y="100" width="20" height="240" fill="#0F6E56" opacity="0.7" stroke="#04342C" stroke-width="0.5"/>
  <rect x="470" y="100" width="20" height="240" fill="#0F6E56" opacity="0.7" stroke="#04342C" stroke-width="0.5"/>

  <rect x="150" y="340" width="60" height="24" fill="#185FA5" opacity="0.7" stroke="#042C53" stroke-width="0.5"/>
  <rect x="450" y="340" width="60" height="24" fill="#185FA5" opacity="0.7" stroke="#042C53" stroke-width="0.5"/>

  <rect x="220" y="330" width="220" height="10" fill="#D85A30" opacity="0.85" stroke="#4A1B0C" stroke-width="0.5"/>

  <rect x="140" y="400" width="380" height="100" fill="#F1EFE8" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="330" y="455" font-size="12" text-anchor="middle" fill="#5F5E5A">加圧室 V_supply</text>
  <text x="330" y="473" font-size="12" text-anchor="middle" fill="#5F5E5A">(ふいご/ブロワ)</text>

  <line x1="330" y1="495" x2="330" y2="370" stroke="#D85A30" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="330" y="510" font-size="12" text-anchor="middle" fill="#D85A30">加圧空気</text>

  <path d="M 330,325 L 330,280" stroke="#A32D2D" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 300,325 L 240,260" stroke="#A32D2D" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 360,325 L 420,260" stroke="#A32D2D" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>

  <path d="M 240,260 C 250,200 260,150 270,110" stroke="#A32D2D" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
  <path d="M 420,260 C 410,200 400,150 390,110" stroke="#A32D2D" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
  <text x="252" y="185" font-size="12" fill="#A32D2D" text-anchor="middle">反射</text>
  <text x="408" y="185" font-size="12" fill="#A32D2D" text-anchor="middle">反射</text>

  <circle cx="330" cy="270" r="4" fill="#A32D2D"/>
  <text x="345" y="273" font-size="12" fill="#A32D2D">直接放射(上)</text>

  <text x="90" y="120" font-size="14" font-weight="500" text-anchor="middle" fill="#0F6E56">柱</text>
  <text x="90" y="138" font-size="12" text-anchor="middle" fill="#0F6E56">高さ H_col</text>
  <text x="90" y="154" font-size="12" text-anchor="middle" fill="#0F6E56">間隔 w_gap</text>
  <text x="90" y="170" font-size="12" text-anchor="middle" fill="#0F6E56">反射面</text>

  <text x="595" y="340" font-size="14" font-weight="500" text-anchor="middle" fill="#4A1B0C">リード</text>
  <text x="595" y="358" font-size="12" text-anchor="middle" fill="#4A1B0C">水平配置</text>
  <text x="595" y="374" font-size="12" text-anchor="middle" fill="#4A1B0C">両端支持</text>

  <text x="90" y="395" font-size="14" font-weight="500" text-anchor="middle" fill="#0C447C">受け</text>
  <text x="90" y="413" font-size="12" text-anchor="middle" fill="#0C447C">リード固定</text>

  <text x="625" y="270" font-size="12" text-anchor="end" fill="#A32D2D">双極子+バッフル</text>
  <text x="625" y="287" font-size="12" text-anchor="end" fill="#A32D2D">= 上方指向放射</text>
</svg>
