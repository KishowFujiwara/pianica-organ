<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="sans-serif">
<style>
  .title { font-size: 22px; font-weight: bold; }
  .stage-title { font-size: 16px; font-weight: bold; }
  .label { font-size: 12px; }
  .small { font-size: 10px; fill: #555; }
  .num { font-size: 14px; font-weight: bold; }
  .obs { fill: #e8f0f8; stroke: #28a; stroke-width: 2; }
  .ana { fill: #fdf0e8; stroke: #d80; stroke-width: 2; }
  .eval { fill: #f8e8e8; stroke: #c33; stroke-width: 2; }
  .char { fill: #e8f8e8; stroke: #393; stroke-width: 2; }
  .arrow { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#a);}
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
  </marker>
</defs>

<text x="550" y="32" text-anchor="middle" class="title">ピアニカP-32D 振動・放射特性 包括分析レポート</text>
<text x="550" y="55" text-anchor="middle" class="small">観測 -> 分析 -> 評価 -> 音響的性質の特定 (4段階フロー)</text>

<!-- Stage 1: 観測 -->
<rect x="40" y="80" width="240" height="240" rx="8" class="obs"/>
<text x="160" y="105" text-anchor="middle" class="stage-title" fill="#28a">[1] 観測</text>
<text x="55" y="130" class="label" font-weight="bold">対象</text>
<text x="55" y="148" class="small">ヤマハ ピアニカP-32D</text>
<text x="55" y="162" class="small">圧力式フリーリード</text>
<text x="55" y="176" class="small">F3-C6, ABS筐体 1.5mm</text>

<text x="55" y="200" class="label" font-weight="bold">同定された経路: 22</text>
<text x="55" y="218" class="small">A系列(空気): 5経路</text>
<text x="55" y="232" class="small">B系列(固体): 9経路</text>
<text x="55" y="246" class="small">  -- B1a/B1b は新発見</text>
<text x="55" y="260" class="small">C系列(再放射): 5経路</text>
<text x="55" y="274" class="small">D系列(FB): 3経路</text>

<text x="55" y="298" class="small" fill="#28a" font-weight="bold">前提: 全パワー 48 mW</text>
<text x="55" y="312" class="small" fill="#28a">A4=440Hz, P=1500Pa</text>

<!-- Stage 2: 分析 -->
<rect x="300" y="80" width="240" height="240" rx="8" class="ana"/>
<text x="420" y="105" text-anchor="middle" class="stage-title" fill="#d80">[2] 分析</text>
<text x="315" y="130" class="label" font-weight="bold">5軸マトリクス</text>
<text x="315" y="148" class="small">軸1: パワー収支 [μW]</text>
<text x="315" y="162" class="small">軸2: 周波数応答 [Hz, Q]</text>
<text x="315" y="176" class="small">軸3: 位相・遅延 [ms]</text>
<text x="315" y="190" class="small">軸4: 経路間結合</text>
<text x="315" y="204" class="small">軸5: 音色寄与 (時間)</text>

<text x="315" y="228" class="label" font-weight="bold">110 データポイント</text>
<text x="315" y="246" class="small">22 経路 × 5 軸</text>

<text x="315" y="270" class="label" font-weight="bold">主要数値</text>
<text x="315" y="288" class="small">ABS底面(1,1) = 323Hz</text>
<text x="315" y="302" class="small" fill="#d80" font-weight="bold">外部放射計 21,008 μW</text>

<!-- Stage 3: 評価 -->
<rect x="560" y="80" width="240" height="240" rx="8" class="eval"/>
<text x="680" y="105" text-anchor="middle" class="stage-title" fill="#c33">[3] 評価</text>
<text x="575" y="130" class="label" font-weight="bold">妥当性検証</text>
<text x="575" y="148" class="small">[OK] エネルギー保存則</text>
<text x="575" y="162" class="small">[OK] 固体伝導モデル(286倍)</text>
<text x="575" y="176" class="small">[OK] アコーディオン職人知見</text>
<text x="575" y="190" class="small">[OK] テープ処置効果説明</text>
<text x="575" y="204" class="small">[OK] 演奏家経験(中音域鳴る)</text>

<text x="575" y="228" class="label" font-weight="bold">既存文書修正</text>
<text x="575" y="246" class="small">A1「楽音主経路」は誤り</text>
<text x="575" y="260" class="small">-&gt; 実は 0.8% に過ぎない</text>

<text x="575" y="284" class="label" font-weight="bold">不確実性</text>
<text x="575" y="302" class="small">パワー値±50%、順位は不変</text>

<!-- Stage 4: 性質特定 -->
<rect x="820" y="80" width="240" height="240" rx="8" class="char"/>
<text x="940" y="105" text-anchor="middle" class="stage-title" fill="#393">[4] 性質特定</text>
<text x="835" y="130" class="label" font-weight="bold" fill="#393">ピアニカP-32D は</text>
<text x="835" y="148" class="num" fill="#393">振動板型エンクロー</text>
<text x="835" y="166" class="num" fill="#393">ジャ・スピーカー</text>

<text x="835" y="194" class="label" font-weight="bold">音源: フリーリード</text>
<text x="835" y="210" class="label" font-weight="bold">振動板: ABS箱壁面</text>
<text x="835" y="226" class="label" font-weight="bold">主共振: 323Hz</text>

<text x="835" y="252" class="small">中音域(E4-G4)で最大鳴り</text>
<text x="835" y="266" class="small">リリース 33ms (壁Q=33)</text>
<text x="835" y="280" class="small">音圧 70-80 dB SPL @1m</text>

<text x="835" y="304" class="small" fill="#393" font-weight="bold">理論上限: 76 dB SPL</text>

<!-- 矢印 -->
<path d="M285 200 L295 200" class="arrow"/>
<path d="M545 200 L555 200" class="arrow"/>
<path d="M805 200 L815 200" class="arrow"/>

<!-- 下部: 主要発見と外部放射の構成 -->
<text x="60" y="360" class="stage-title">主要発見の可視化</text>

<!-- 外部放射の円グラフ風バー -->
<text x="60" y="390" class="label" font-weight="bold">外部放射 (21,008 μW) の経路別構成</text>
<g transform="translate(60, 405)">
  <rect x="0" y="0" width="715" height="35" fill="#fdf6e0" stroke="#999"/>
  <rect x="0" y="0" width="510" height="35" fill="#d80" opacity="0.8"/>
  <text x="255" y="22" text-anchor="middle" class="num" fill="white">C1 壁面放射 71.4%</text>
  
  <rect x="510" y="0" width="170" height="35" fill="#c83" opacity="0.8"/>
  <text x="595" y="22" text-anchor="middle" class="num" fill="white">C2 壁-&gt;穴 23.8%</text>
  
  <rect x="680" y="0" width="27" height="35" fill="#a44" opacity="0.7"/>
  <rect x="707" y="0" width="6" height="35" fill="#28a" opacity="0.7"/>
  <text x="710" y="55" text-anchor="middle" class="small" fill="#28a">A1 0.8%</text>
  <text x="694" y="22" class="small" fill="white">C4 3.8%</text>
</g>

<text x="60" y="475" class="small">「楽音主経路」と呼ばれた A1 は実は 0.8%。外部放射の95.2%は ABS壁面 (C1+C2) 由来。</text>

<!-- 周波数特性チャート -->
<text x="60" y="510" class="label" font-weight="bold">主要共振点と楽音帯域</text>
<g transform="translate(60, 525)">
  <line x1="0" y1="60" x2="900" y2="60" stroke="#666" stroke-width="1.5"/>
  <!-- 周波数軸 -->
  <text x="-15" y="64" class="small">f [Hz]</text>
  <line x1="50" y1="55" x2="50" y2="65" stroke="#666"/>
  <text x="50" y="80" text-anchor="middle" class="small">100</text>
  <line x1="200" y1="55" x2="200" y2="65" stroke="#666"/>
  <text x="200" y="80" text-anchor="middle" class="small">300</text>
  <line x1="350" y1="55" x2="350" y2="65" stroke="#666"/>
  <text x="350" y="80" text-anchor="middle" class="small">500</text>
  <line x1="500" y1="55" x2="500" y2="65" stroke="#666"/>
  <text x="500" y="80" text-anchor="middle" class="small">800</text>
  <line x1="700" y1="55" x2="700" y2="65" stroke="#666"/>
  <text x="700" y="80" text-anchor="middle" class="small">1500</text>
  
  <!-- 楽音帯域バー -->
  <rect x="120" y="20" width="650" height="20" fill="#cfe5f5" stroke="#28a" opacity="0.5"/>
  <text x="445" y="34" text-anchor="middle" class="small">楽音帯域 F3 (175Hz) -- F6 (1397Hz)</text>
  
  <!-- 主要共振点 -->
  <circle cx="105" cy="60" r="6" fill="#888"/>
  <text x="105" y="-5" text-anchor="middle" class="small">A1 Helm</text>
  <text x="105" y="105" text-anchor="middle" class="small">124Hz</text>
  
  <circle cx="220" cy="60" r="14" fill="#c33"/>
  <text x="220" y="-5" text-anchor="middle" class="small" font-weight="bold" fill="#c33">ABS底面(1,1)</text>
  <text x="220" y="105" text-anchor="middle" class="small" font-weight="bold" fill="#c33">323Hz Q=33 (主共振)</text>
  
  <circle cx="290" cy="60" r="9" fill="#28a"/>
  <text x="290" y="-5" text-anchor="middle" class="small" fill="#28a">A4 リード</text>
  <text x="290" y="105" text-anchor="middle" class="small" fill="#28a">440Hz</text>
  
  <circle cx="365" cy="60" r="6" fill="#888"/>
  <text x="365" y="-5" text-anchor="middle" class="small">定在波</text>
  <text x="365" y="105" text-anchor="middle" class="small">536Hz</text>
  
  <circle cx="465" cy="60" r="8" fill="#28a"/>
  <text x="465" y="105" text-anchor="middle" class="small" fill="#28a">B1b 整流</text>
  <text x="465" y="120" text-anchor="middle" class="small" fill="#28a">880Hz</text>
  
  <circle cx="540" cy="60" r="5" fill="#888"/>
  <text x="540" y="-5" text-anchor="middle" class="small">(2,1)</text>
  <text x="540" y="105" text-anchor="middle" class="small">645Hz</text>
</g>

<text x="60" y="680" class="small" font-weight="bold">結論: 中音域 E4 (329Hz) は ABS底面共振 323Hz とほぼ完全一致 -&gt; 鳴り最大 (差わずか +6Hz)</text>
</svg>
